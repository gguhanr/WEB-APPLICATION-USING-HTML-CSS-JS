<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BestOS - Web Environment</title>
    
    <!-- Dynamic Manifest for PWA Support built into 1 file -->
    <script>
        const manifest = {
            name: "BestOS Environment",
            short_name: "BestOS",
            start_url: ".",
            display: "standalone",
            background_color: "#0f172a",
            theme_color: "#0f172a",
            icons: [{ src: "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48Y2lyY2xlIGN4PSI1MCIgY3k9IjUwIiByPSI1MCIgZmlsbD0iIzM4YmRmOCIvPjwvc3ZnPg==", sizes: "192x192", type: "image/svg+xml" }]
        };
        const stringManifest = JSON.stringify(manifest);
        const blobManifest = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blobManifest);
        document.write(`<link rel="manifest" href="${manifestURL}">`);
    </script>

    <!-- Google Fonts & Lucide Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ================= THEME & CSS VARIABLES ================= */
        :root {
            --sys-bg: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop');
            --glass-bg: rgba(20, 25, 35, 0.65);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            
            --window-bg: rgba(22, 27, 34, 0.85);
            --window-header: rgba(30, 35, 45, 0.9);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --danger-hover: #dc2626;

            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        .light-mode {
            --glass-bg: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(0, 0, 0, 0.1);
            --window-bg: rgba(248, 250, 252, 0.85);
            --window-header: rgba(226, 232, 240, 0.9);
            --text-main: #0f172a;
            --text-muted: #475569;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; user-select: none; }
        
        body {
            width: 100vw; height: 100vh;
            background-image: var(--sys-bg);
            background-size: cover; background-position: center;
            overflow: hidden; color: var(--text-main);
            display: flex; flex-direction: column;
        }

        /* Glassmorphism Utility */
        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
        }

        /* ================= DESKTOP ================= */
        #desktop {
            flex: 1; position: relative; padding: 10px;
            display: grid; grid-template-columns: repeat(auto-fill, 80px);
            grid-auto-rows: 100px; gap: 10px; grid-auto-flow: column;
        }

        .desktop-icon {
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            padding: 8px; border-radius: var(--radius-sm); cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); text-align: center;
        }
        .desktop-icon:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .desktop-icon img, .desktop-icon svg { width: 40px; height: 40px; margin-bottom: 8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .desktop-icon span { font-size: 11px; text-shadow: 0 1px 3px rgba(0,0,0,0.8); color: white; word-wrap: break-word; max-width: 100%; line-height: 1.2; }

        /* Widget Area */
        #widgets-container { position: absolute; top: 20px; right: 20px; width: 250px; display: flex; flex-direction: column; gap: 15px; pointer-events: none; }
        .widget { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: var(--radius-lg); padding: 15px; color: var(--text-main); pointer-events: auto; }
        .clock-widget h1 { font-size: 3rem; font-weight: 300; margin: 0; line-height: 1; }
        .clock-widget p { font-size: 0.9rem; color: var(--text-muted); margin-top: 5px; }

        /* ================= TASKBAR ================= */
        #taskbar {
            height: 52px; width: 100%; z-index: 10000;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10px; border-top: 1px solid var(--glass-border);
        }
        
        .tb-section { display: flex; align-items: center; height: 100%; gap: 6px; }
        
        .tb-btn {
            width: 40px; height: 40px; border-radius: var(--radius-sm);
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; transition: all 0.2s; border: none; background: transparent; color: var(--text-main);
        }
        .tb-btn:hover { background: rgba(255,255,255,0.15); }
        .tb-btn.active { background: rgba(255,255,255,0.25); box-shadow: inset 0 -2px 0 var(--accent); }
        
        #start-btn { border-radius: 50%; color: var(--accent); }
        #start-btn:hover { transform: scale(1.05); }

        .tray { font-size: 12px; display: flex; align-items: center; gap: 12px; padding: 0 10px; border-radius: var(--radius-md); transition: 0.2s; cursor: pointer; height: 36px; }
        .tray:hover { background: rgba(255,255,255,0.1); }
        .tray-icons { display: flex; gap: 6px; }
        .tray-icons svg { width: 16px; height: 16px; }

        /* ================= START MENU ================= */
        #start-menu {
            position: absolute; bottom: 65px; left: 10px; width: 380px; max-height: 600px;
            border-radius: var(--radius-xl); z-index: 9999; padding: 20px;
            display: flex; flex-direction: column; gap: 20px;
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #start-menu.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        
        .search-box { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 20px; padding: 10px 15px; color: var(--text-main); outline: none; transition: 0.2s; }
        .search-box:focus { background: rgba(0,0,0,0.4); border-color: var(--accent); }

        .pinned-apps { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
        .app-grid-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; padding: 10px; border-radius: var(--radius-md); transition: 0.2s; }
        .app-grid-item:hover { background: rgba(255,255,255,0.1); transform: scale(1.05); }
        .app-grid-item svg { width: 32px; height: 32px; }
        .app-grid-item span { font-size: 12px; }



        /* ================= WINDOW MANAGER ================= */
        #window-container { position: absolute; top: 0; left: 0; width: 100%; height: calc(100% - 52px); pointer-events: none; z-index: 5000; overflow: hidden; }
        
        .os-window {
            position: absolute; width: 600px; height: 400px; top: 10%; left: 20%;
            background: var(--window-bg); border-radius: var(--radius-md);
            border: 1px solid var(--glass-border); box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column; pointer-events: auto; overflow: hidden;
            backdrop-filter: blur(20px);
            animation: windowOpen 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            min-width: 300px; min-height: 200px;
        }
        
        .os-window.maximized { top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; border-radius: 0; }
        .os-window.minimized { display: none; }
        .os-window.focus { box-shadow: 0 15px 50px rgba(0,0,0,0.6); border-color: rgba(255,255,255,0.2); }

        .window-header {
            height: 36px; background: var(--window-header); display: flex; align-items: center; justify-content: space-between;
            padding: 0 10px; cursor: move; user-select: none; border-bottom: 1px solid var(--glass-border);
        }
        .window-title { font-size: 13px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
        .window-controls { display: flex; gap: 6px; }
        .win-ctrl { width: 14px; height: 14px; border-radius: 50%; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; opacity: 0.8; }
        .win-ctrl:hover { opacity: 1; }
        .win-ctrl svg { width: 8px; height: 8px; opacity: 0; transition: 0.2s; color: rgba(0,0,0,0.7); }
        .win-ctrl:hover svg { opacity: 1; }
        .ctrl-close { background: #ff5f56; } .ctrl-max { background: #27c93f; } .ctrl-min { background: #ffbd2e; }

        .window-content { flex: 1; position: relative; background: rgba(0,0,0,0.1); overflow: auto; display: flex; }
        .window-resize-handle { position: absolute; bottom: 0; right: 0; width: 15px; height: 15px; cursor: se-resize; z-index: 10; }

        @keyframes windowOpen {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        /* ================= APP SPECIFIC STYLES ================= */
        /* Explorer */
        .explorer-layout { display: flex; width: 100%; height: 100%; }
        .explorer-sidebar { width: 160px; background: rgba(0,0,0,0.2); border-right: 1px solid var(--glass-border); padding: 10px 0; }
        .explorer-nav-item { padding: 8px 15px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: 0.2s; }
        .explorer-nav-item:hover, .explorer-nav-item.active { background: rgba(255,255,255,0.1); border-left: 3px solid var(--accent); }
        .explorer-main { flex: 1; display: flex; flex-direction: column; }
        .explorer-toolbar { padding: 10px; border-bottom: 1px solid var(--glass-border); display: flex; gap: 10px; }
        .explorer-grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, 80px); gap: 15px; }

        /* Browser */
        .browser-toolbar { display: flex; gap: 10px; padding: 8px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--glass-border); align-items: center; }
        .browser-url { flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 6px 15px; color: white; outline: none; font-size: 13px; }
        .browser-engine-select { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; color: white; padding: 6px; outline: none; font-size: 13px; cursor: pointer; }
        .browser-engine-select option { background: var(--window-header); color: white; }
        .browser-frame { flex: 1; border: none; background: white; }

        /* Notes */
        .notes-area { width: 100%; height: 100%; background: transparent; border: none; padding: 20px; color: var(--text-main); outline: none; resize: none; font-size: 15px; line-height: 1.5; font-family: 'Inter', sans-serif;}
        
        /* Calculator */
        .calc-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 15px; width: 100%; height: 100%; }
        .calc-display { grid-column: span 4; background: rgba(0,0,0,0.3); border-radius: var(--radius-sm); text-align: right; padding: 15px; font-size: 2rem; margin-bottom: 10px; word-break: break-all; }
        .calc-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: var(--radius-sm); color: var(--text-main); font-size: 1.2rem; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center;}
        .calc-btn:hover { background: rgba(255,255,255,0.15); }
        .calc-btn.op { background: rgba(59, 130, 246, 0.3); color: #93c5fd; }
        .calc-btn.eq { background: var(--accent); color: white; }

        /* Context Menus */
        .os-context-menu {
            position: absolute; background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-sm);
            padding: 5px 0; min-width: 200px; z-index: 15000; box-shadow: var(--glass-shadow);
            display: none;
        }
        .context-item { padding: 8px 15px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .context-item:hover { background: var(--accent); color: white; }

        /* Notifications */
        #notifications { position: absolute; bottom: 65px; right: 15px; z-index: 20000; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .toast { background: var(--glass-bg); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); padding: 12px 20px; border-radius: var(--radius-md); box-shadow: var(--glass-shadow); color: var(--text-main); font-size: 13px; display: flex; align-items: center; gap: 12px; pointer-events: auto; animation: slideInRight 0.3s forwards; }
        @keyframes slideInRight { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }

        /* VPN Panel */
        #vpn-panel {
            position: absolute; bottom: 65px; right: 10px; width: 300px;
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: var(--radius-lg);
            padding: 20px; z-index: 9999; color: var(--text-main);
            box-shadow: var(--glass-shadow);
            transform: translateY(20px); opacity: 0; pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #vpn-panel.open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        .vpn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .vpn-status-circle { border-radius: 50%; border: 3px solid var(--danger); transition: 0.3s; }
        .vpn-status-circle.connected { border-color: #10b981; background: rgba(16, 185, 129, 0.1); }
        .vpn-status-circle.connecting { border-top-color: transparent; border-right-color: transparent; animation: vpnSpin 1s linear infinite; }
        @keyframes vpnSpin { 100% { transform: rotate(360deg); } }
        .vpn-btn { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 500; transition: 0.2s; font-size: 14px;}
        .vpn-btn:hover { background: var(--accent-hover); }
        .vpn-btn:disabled { opacity: 0.7; cursor: not-allowed; }
        .vpn-btn.disconnect { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .vpn-select { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); padding: 12px; color: white; border-radius: var(--radius-sm); outline: none; margin-bottom: 20px; font-size: 13px;}
        .vpn-select option { background: var(--window-header); }

        /* Author Credit footer */
        .author-credit {
            position: fixed; bottom: 65px; right: 20px; z-index: 9998;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2); border-radius: 20px;
            padding: 6px 16px; display: flex; align-items: center; gap: 8px;
            text-decoration: none; color: white; font-size: 12px; font-weight: 500;
            transition: all 0.3s; box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .author-credit:hover { background: rgba(59,130,246,0.6); border-color: rgba(255,255,255,0.4); transform: translateY(-2px); }
        .author-credit svg { width: 14px; height: 14px; }

        /* Utility */
        button { outline: none; }
    </style>
</head>
<body>

    <!-- Desktop Area -->
    <div id="desktop" class="context-area" data-context="desktop" ondragover="event.preventDefault()" ondrop="BestOS.UI.handleDesktopDrop(event)">
        <!-- Desktop Icons generated by JS -->
    </div>

    <!-- Author Credit -->
    <a href="#" class="author-credit">
        <i data-lucide="code-2"></i> Developed by BestTeam
    </a>

    <!-- Windows Container -->
    <div id="window-container"></div>

    <!-- Start Menu -->
    <div id="start-menu" class="glass">
        <input type="text" class="search-box" placeholder="Type here to search apps, files...">
        
        <div>
            <h4 style="font-size: 13px; color: var(--text-muted); margin-bottom: 10px;">Pinned Apps</h4>
            <div class="pinned-apps" id="start-pinned-apps">
                <!-- Apps generated here -->
            </div>
        </div>

        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 10px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
            <div style="display: flex; align-items: center; gap: 10px;">
                <div style="width: 32px; height: 32px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center;"><i data-lucide="user" style="color:white; width:18px;"></i></div>
                <span style="font-size: 14px; font-weight: 500;">Guest User</span>
            </div>
            <button class="tb-btn" onclick="location.reload()" title="Restart OS"><i data-lucide="power"></i></button>
        </div>
    </div>

    <!-- Notifications Area -->
    <div id="notifications"></div>

    <!-- Desktop Context Menu -->
    <div id="desktop-context-menu" class="os-context-menu">
        <div class="context-item" onclick="BestOS.FS.createFile('desktop', 'New Text.txt', 'txt')"><i data-lucide="file-plus"></i> New Text File</div>
        <div class="context-item" onclick="BestOS.FS.createFolder('desktop', 'New Folder')"><i data-lucide="folder-plus"></i> New Folder</div>
        <div class="context-item" onclick="BestOS.FS.triggerAddLink('desktop')"><i data-lucide="link"></i> New Quick Link</div>
        <div class="context-item" onclick="BestOS.FS.triggerUpload('desktop')"><i data-lucide="upload"></i> Upload Media &amp; Web Apps</div>
        <div style="height: 1px; background: var(--glass-border); margin: 5px 0;"></div>
        <div class="context-item" onclick="BestOS.Apps.launch('settings')"><i data-lucide="monitor"></i> Personalize Desktop</div>
        <div class="context-item" onclick="location.reload()"><i data-lucide="refresh-cw"></i> Refresh System</div>
    </div>

    <!-- Item Context Menu (For Apps and Files) -->
    <div id="item-context-menu" class="os-context-menu">
        <div class="context-item" onclick="BestOS.FS.triggerRename()"><i data-lucide="edit-2"></i> Rename</div>
        <div class="context-item" onclick="BestOS.FS.triggerChangeIcon()"><i data-lucide="image"></i> Change Logo/Icon</div>
        <div style="height: 1px; background: var(--glass-border); margin: 5px 0;"></div>
        <div class="context-item" onclick="BestOS.FS.triggerDelete()" style="color: #ef4444;"><i data-lucide="trash-2"></i> Delete</div>
    </div>

    <!-- VPN Panel -->
    <div id="vpn-panel" class="glass">
        <div class="vpn-header">
            <span style="font-weight:600; display:flex; align-items:center; gap:8px;"><i data-lucide="shield"></i> Secure VPN</span>
        </div>
        <div style="position:relative; width: 70px; height: 70px; margin: 0 auto 15px;">
            <div id="vpn-circle" class="vpn-status-circle" style="position:absolute; width:100%; height:100%; top:0; left:0;"></div>
            <div style="position:absolute; top:0; left:0; width:100%; height:100%; display:flex; justify-content:center; align-items:center;">
                <i data-lucide="power" id="vpn-power-icon" style="width:24px; height:24px; color: var(--danger); transition: 0.3s;"></i>
            </div>
        </div>
        <div style="text-align:center; margin-bottom:20px;">
            <div id="vpn-status-text" style="font-size:16px; font-weight:600; margin-bottom:5px;">Disconnected</div>
            <div id="vpn-ip-text" style="font-size:12px; color:var(--text-muted); font-family:monospace;">IP: 192.168.1.104 (Real)</div>
        </div>
        <select id="vpn-country" class="vpn-select">
            <option value="us">&#127482;&#127480; United States (New York)</option>
            <option value="uk">&#127468;&#127463; United Kingdom (London)</option>
            <option value="jp">&#127471;&#127477; Japan (Tokyo)</option>
            <option value="sg">&#127480;&#127468; Singapore</option>
            <option value="de">&#127465;&#127466; Germany (Frankfurt)</option>
            <option value="in">&#127470;&#127475; India (Mumbai)</option>
            <option value="au">&#127462;&#127482; Australia (Sydney)</option>
        </select>
        <button id="vpn-toggle-btn" class="vpn-btn" onclick="BestOS.Apps.toggleVPN()">Connect VPN</button>
    </div>

    <!-- Taskbar -->
    <div id="taskbar" class="glass">
        <div class="tb-section" id="taskbar-left">
            <button id="start-btn" class="tb-btn" onclick="BestOS.UI.toggleStartMenu()">
                <i data-lucide="layers"></i>
            </button>
            <div style="width: 1px; height: 24px; background: var(--glass-border); margin: 0 5px;"></div>
            <!-- Open App Icons -->
            <div id="taskbar-apps" class="tb-section"></div>
        </div>
        
        <div class="tb-section">
            <button class="tb-btn" onclick="BestOS.UI.toggleTheme()" title="Toggle Theme"><i data-lucide="sun-moon"></i></button>
            <div id="vpn-tray-btn" class="tray" onclick="BestOS.UI.toggleVPNPanel()" title="Secure VPN" style="padding: 0 8px;">
                <i data-lucide="shield" id="tb-vpn-icon" style="transition: 0.3s;"></i>
            </div>
            <div class="tray" onclick="BestOS.UI.toggleStartMenu()">
                <div class="tray-icons">
                    <i data-lucide="wifi"></i>
                    <i data-lucide="battery-medium"></i>
                </div>
                <div style="text-align: right; line-height: 1.2;">
                    <div id="tb-time" style="font-weight: 500;">00:00</div>
                    <div id="tb-date" style="font-size: 10px; color: var(--text-muted);">00/00/0000</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        /**
         * BestOS Core Engine
         * Built as a single-file modular architecture.
         * Developed by BestTeam.
         */
        const BestOS = {
            version: '1.0.0',
            state: {
                zIndexCounter: 5000,
                runningApps: {},
                startMenuOpen: false,
                contextMenuTarget: null,
                vpnOpen: false,
                vpnStatus: 'disconnected'
            },

            // 1. Storage Engine (IndexedDB + LocalStorage)
            Storage: {
                db: null,
                init() {
                    return new Promise((resolve, reject) => {
                        const request = indexedDB.open('BestOS_FS', 1);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if(!db.objectStoreNames.contains('files')) {
                                db.createObjectStore('files', { keyPath: 'id' });
                            }
                        };
                        request.onsuccess = (e) => {
                            this.db = e.target.result;
                            this.seedDefaults().then(resolve);
                        };
                        request.onerror = reject;
                    });
                },
                async seedDefaults() {
                    const defaultFolders = ['desktop', 'documents', 'images', 'videos', 'downloads'];
                    for(let folder of defaultFolders) {
                        await this.save({ id: folder, name: folder.charAt(0).toUpperCase() + folder.slice(1), type: 'folder', parent: 'root' });
                    }
                    // Example file
                    await this.save({ id: 'readme.txt', name: 'Welcome.txt', type: 'txt', parent: 'desktop', content: 'Welcome to BestOS!\n\nDeveloped by BestTeam.\n\nEnjoy the multi-window environment!' });
                },
                save(data) {
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('files', 'readwrite');
                        tx.objectStore('files').put(data);
                        tx.oncomplete = () => resolve(data);
                    });
                },
                get(id) {
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('files', 'readonly');
                        const req = tx.objectStore('files').get(id);
                        req.onsuccess = () => resolve(req.result);
                    });
                },
                getAllByParent(parentId) {
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('files', 'readonly');
                        const req = tx.objectStore('files').getAll();
                        req.onsuccess = () => {
                            resolve(req.result.filter(f => f.parent === parentId));
                        };
                    });
                },
                remove(id) {
                    return new Promise((resolve) => {
                        const tx = this.db.transaction('files', 'readwrite');
                        tx.objectStore('files').delete(id);
                        tx.oncomplete = resolve;
                    });
                }
            },

                            else if (file.type.startsWith('video/')) type = 'video';
                            else if (file.type.startsWith('audio/')) type = 'audio';

                            else if (file.type === 'application/pdf' || file.name.endsWith('.pdf')) type = 'pdf';
                            else if (file.type.startsWith('text/') || file.name.endsWith('.txt')) type = 'txt';

            // 4. Window Manager Engine
            WM: {
                createWindow(id, title, htmlContent, width, height, icon) {
                    if (BestOS.state.runningApps[id]) {
                        this.focus(id); return;
                    }

                    BestOS.state.zIndexCounter++;
                    const win = document.createElement('div');
                    win.className = 'os-window';
                    win.id = 'win-' + id;
                    win.style.width = width + 'px';
                    win.style.height = height + 'px';
                    win.style.zIndex = BestOS.state.zIndexCounter;
                    
                    const offset = Object.keys(BestOS.state.runningApps).length * 20;
                    win.style.top = (100 + offset) + 'px';
                    win.style.left = (150 + offset) + 'px';

                    win.innerHTML = `
                        <div class="window-header" onmousedown="BestOS.WM.focus('${id}')">
                            <div class="window-title"><i data-lucide="${icon}" style="width:14px; color:var(--accent);"></i> ${title}</div>
                            <div class="window-controls">
                                <button class="win-ctrl ctrl-min" onclick="BestOS.WM.minimize('${id}')" title="Minimize"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="5" y1="12" x2="19" y2="12"></line></svg></button>
                                <button class="win-ctrl ctrl-max" onclick="BestOS.WM.maximize('${id}')" title="Maximize"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="15 3 21 3 21 9"></polyline><polyline points="9 21 3 21 3 15"></polyline><line x1="21" y1="3" x2="14" y2="10"></line><line x1="3" y1="21" x2="10" y2="14"></line></svg></button>
                                <button class="win-ctrl ctrl-close" onclick="BestOS.WM.close('${id}')" title="Close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg></button>
                            </div>
                        </div>
                        <div class="window-content" onmousedown="BestOS.WM.focus('${id}')">
                            ${htmlContent}
                        </div>
                        <div class="window-resize-handle"></div>
                    `;

                    document.getElementById('window-container').appendChild(win);
                    lucide.createIcons({ root: win });

                    BestOS.state.runningApps[id] = { el: win, icon, title, maximized: false, minimized: false };
                    
                    this.makeDraggable(win.querySelector('.window-header'), win);
                    this.makeResizable(win);
                    this.focus(id);
                    BestOS.UI.updateTaskbar();
                },

                focus(id) {
                    Object.values(BestOS.state.runningApps).forEach(app => app.el.classList.remove('focus'));
                    const win = BestOS.state.runningApps[id].el;
                    BestOS.state.zIndexCounter++;
                    win.style.zIndex = BestOS.state.zIndexCounter;
                    win.classList.add('focus');
                },

                close(id) {
                    const win = BestOS.state.runningApps[id].el;
                    win.style.animation = 'fadeOut 0.2s forwards';
                    setTimeout(() => {
                        win.remove();
                        delete BestOS.state.runningApps[id];
                        BestOS.UI.updateTaskbar();
                    }, 200);
                },

                minimize(id) {
                    BestOS.state.runningApps[id].minimized = true;
                    BestOS.state.runningApps[id].el.classList.add('minimized');
                    BestOS.UI.updateTaskbar();
                },

                restore(id) {
                    BestOS.state.runningApps[id].minimized = false;
                    BestOS.state.runningApps[id].el.classList.remove('minimized');
                    this.focus(id);
                    BestOS.UI.updateTaskbar();
                },

                maximize(id) {
                    const app = BestOS.state.runningApps[id];
                    app.maximized = !app.maximized;
                    if(app.maximized) app.el.classList.add('maximized');
                    else app.el.classList.remove('maximized');
                },

                makeDraggable(header, win) {
                    let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
                    header.onmousedown = dragMouseDown;
                    header.ontouchstart = (e) => { e.preventDefault(); dragMouseDown(e.touches[0]); };

                    function dragMouseDown(e) {
                        e.preventDefault();
                        if(win.classList.contains('maximized')) return;
                        pos3 = e.clientX; pos4 = e.clientY;
                        document.onmouseup = closeDragElement;
                        document.onmousemove = elementDrag;
                        document.ontouchend = closeDragElement;
                        document.ontouchmove = (ev) => elementDrag(ev.touches[0]);
                    }

                    function elementDrag(e) {
                        e.preventDefault();
                        pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                        pos3 = e.clientX; pos4 = e.clientY;
                        win.style.top = Math.max(0, (win.offsetTop - pos2)) + "px";
                        win.style.left = (win.offsetLeft - pos1) + "px";
                    }

                    function closeDragElement() {
                        document.onmouseup = null; document.onmousemove = null;
                        document.ontouchend = null; document.ontouchmove = null;
                    }
                },

                makeResizable(win) {
                    const handle = win.querySelector('.window-resize-handle');
                    let startX, startY, startW, startH;

                    handle.onmousedown = (e) => {
                        e.preventDefault();
                        startX = e.clientX; startY = e.clientY;
                        startW = parseInt(document.defaultView.getComputedStyle(win).width, 10);
                        startH = parseInt(document.defaultView.getComputedStyle(win).height, 10);
                        document.onmouseup = () => { document.onmousemove = null; document.onmouseup = null; };
                        document.onmousemove = (ev) => {
                            win.style.width = (startW + ev.clientX - startX) + 'px';
                            win.style.height = (startH + ev.clientY - startY) + 'px';
                        };
                    };
                }
            },

            UI: {

                    document.addEventListener('contextmenu', (e) => {
                        if(e.target.id === 'desktop') {
                            e.preventDefault();
                            document.getElementById('item-context-menu').style.display = 'none';

                            cm.style.display = 'block';
                            cm.style.left = e.clientX + 'px';
                            cm.style.top = e.clientY + 'px';
                        }
                    });
                    
                    document.addEventListener('click', (event) => {
                        document.getElementById('desktop-context-menu').style.display = 'none';

                        if(BestOS.state.startMenuOpen && !event.target.closest('#start-menu') && !event.target.closest('#start-btn')) {

                        <div class="glass" style="padding:35px; border-radius:24px; width:90%; max-width:550px; max-height: 85vh; overflow-y: auto; display:flex; flex-direction:column; gap:25px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); transform: translateY(20px); transition: transform 0.4s ease;">
                            <div style="text-align:center;">
                                <div style="width:64px; height:64px; background:var(--accent); border-radius:50%; display:flex; justify-content:center; align-items:center; margin: 0 auto 15px; box-shadow: 0 10px 25px rgba(59, 130, 246, 0.5);">
                                    <i data-lucide="rocket" style="color:white; width:32px; height:32px;"></i>
                                </div>
                                <h2 style="font-size: 24px; margin-bottom: 8px;">Welcome to BestOS 1.0</h2>
                                <p style="color:var(--text-muted); font-size: 14px; line-height: 1.5;">Your advanced, persistent browser-based operating system. Here is a quick guide to what you can do.</p>
                            </div>
                            
                            <div style="display:flex; flex-direction:column; gap:18px;">
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <div style="padding:12px; background:rgba(59,130,246,0.1); border-radius:12px; color:var(--accent);"><i data-lucide="hard-drive"></i></div>
                                    <div><h4 style="margin-bottom:2px; font-size:14px;">Persistent Local Storage</h4><p style="font-size:12px; color:var(--text-muted); line-height:1.4;">Files, apps, and settings you create are saved locally in your browser automatically.</p></div>
                                </div>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <div style="padding:12px; background:rgba(16,185,129,0.1); border-radius:12px; color:#10b981;"><i data-lucide="layout"></i></div>
                                    <div><h4 style="margin-bottom:2px; font-size:14px;">Install HTML Web Apps</h4><p style="font-size:12px; color:var(--text-muted); line-height:1.4;">Drag &amp; drop any <b>.html</b> file directly to the desktop to install it as a standalone app.</p></div>
                                </div>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <div style="padding:12px; background:rgba(236,72,153,0.1); border-radius:12px; color:#ec4899;"><i data-lucide="image"></i></div>
                                    <div><h4 style="margin-bottom:2px; font-size:14px;">Media &amp; Documents</h4><p style="font-size:12px; color:var(--text-muted); line-height:1.4;">Drag &amp; drop images, videos, PDFs, and audio to the desktop to view them instantly.</p></div>
                                </div>
                                <div style="display:flex; gap:15px; align-items:center;">
                                    <div style="padding:12px; background:rgba(245,158,11,0.1); border-radius:12px; color:#f59e0b;"><i data-lucide="mouse-pointer-click"></i></div>
                                    <div><h4 style="margin-bottom:2px; font-size:14px;">Right-Click Customization</h4><p style="font-size:12px; color:var(--text-muted); line-height:1.4;">Right-click the desktop to add Quick Links, or right-click files to rename &amp; upload custom icons!</p></div>
                                </div>
                            </div>
                            
                            <button id="welcome-start-btn" class="tb-btn" style="width:100%; padding:14px; background:var(--accent); color:white; font-size:15px; font-weight:600; border-radius:12px; margin-top: 5px;">Let's Go!</button>
                        </div>
                    `;
                    document.body.appendChild(modal);
                    lucide.createIcons({ root: modal });
                    
                    requestAnimationFrame(() => {
                        modal.style.opacity = '1';
                        modal.querySelector('.glass').style.transform = 'translateY(0)';
                    });

                    modal.querySelector('#welcome-start-btn').onclick = () => {
                        localStorage.setItem('bestos_welcomed', 'true');
                        modal.style.opacity = '0';
                        modal.querySelector('.glass').style.transform = 'translateY(20px)';
                        setTimeout(() => modal.remove(), 400);
                        BestOS.notify("Tour completed. Enjoy BestOS!", "System Ready");
                    };
                },

                async handleDesktopDrop(e) {
                    e.preventDefault();
                    
                    if(e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                        for(const file of e.dataTransfer.files) {
                            let type = 'file';
                            if(file.type.startsWith('image/')) type = 'image';
                            else if(file.type.startsWith('video/')) type = 'video';
                            else if(file.type.startsWith('audio/')) type = 'audio';
                            else if(file.type === 'text/html' || file.name.endsWith('.html') || file.name.endsWith('.htm')) type = 'html';
                            else if(file.type === 'application/pdf' || file.name.endsWith('.pdf')) type = 'pdf';
                            else if(file.type.startsWith('text/') || file.name.endsWith('.txt')) type = 'txt';

                            const id = 'file_' + Date.now() + Math.floor(Math.random() * 1000);
                            await BestOS.Storage.save({ id, name: file.name, type: type, parent: 'desktop', blob: file });
                        }
                        BestOS.notify(e.dataTransfer.files.length + " file(s) installed on Desktop", "File System");
                        this.renderDesktop();
                        return;
                    }

                    const appId = e.dataTransfer.getData('application/x-bestos-app');
                    if(appId && BestOS.Apps.registry[appId]) {
                        const app = BestOS.Apps.registry[appId];
                        const id = 'shortcut_' + appId + '_' + Date.now();
                        
                        await BestOS.Storage.save({
                            id: id,
                            name: app.name,
                            type: 'app_shortcut',
                            parent: 'desktop',
                            appId: appId
                        });
                        
                        this.renderDesktop();
                        BestOS.notify(`Shortcut for ${app.name} created`, "Desktop");
                    }
                },

                async renderDesktop() {
                    const desktop = document.getElementById('desktop');
                    desktop.innerHTML = '';
                    const files = await BestOS.FS.getDesktopFiles();
                    
                    files.forEach(file => {
                        const el = document.createElement('div');
                        el.className = 'desktop-icon';
                        
                        let iconHtml = `<i data-lucide="file-text" style="color:#f1f5f9; width:40px;height:40px;"></i>`;
                        if(file.type === 'folder') iconHtml = `<i data-lucide="folder" style="color:#fbbf24; width:40px;height:40px;"></i>`;
                        else if(file.type === 'image') iconHtml = `<i data-lucide="image" style="color:#ec4899; width:40px;height:40px;"></i>`;
                        else if(file.type === 'video') iconHtml = `<i data-lucide="film" style="color:#f97316; width:40px;height:40px;"></i>`;
                        else if(file.type === 'audio') iconHtml = `<i data-lucide="music" style="color:#ef4444; width:40px;height:40px;"></i>`;
                        else if(file.type === 'html') iconHtml = `<i data-lucide="layout" style="color:#14b8a6; width:40px;height:40px;"></i>`;
                        else if(file.type === 'pdf') iconHtml = `<i data-lucide="book-open" style="color:#ef4444; width:40px;height:40px;"></i>`;
                        else if(file.type === 'quicklink') iconHtml = `<i data-lucide="link" style="color:#3b82f6; width:40px;height:40px;"></i>`;
                        else if(file.type === 'app_shortcut') {
                            const appInfo = BestOS.Apps.registry[file.appId];
                            if(appInfo) iconHtml = `<i data-lucide="${appInfo.icon}" style="color:${appInfo.color}; width:40px;height:40px;"></i>`;
                        }
                        
                        if (file.customIcon) {
                            try {
                                const url = URL.createObjectURL(file.customIcon);
                                iconHtml = `<img src="${url}" style="width:40px; height:40px; object-fit:cover; border-radius:8px; margin-bottom:8px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); border: 1px solid rgba(255,255,255,0.1);">`;
                            } catch(e) {}
                        } 
                        else if (file.type === 'quicklink' && file.url) {
                            try {
                                const domain = new URL(file.url).hostname;
                                iconHtml = `<img src="https://www.google.com/s2/favicons?domain=${domain}&sz=64" style="width:40px; height:40px; object-fit:contain; margin-bottom:8px; border-radius:4px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">`;
                            } catch(e) {}
                        }
                        else if (file.type === 'image' && file.blob) {
                            try {
                                const url = URL.createObjectURL(file.blob);
                                iconHtml = `<img src="${url}" style="width:40px; height:40px; object-fit:cover; border-radius:6px; margin-bottom:8px; border: 1px solid rgba(255,255,255,0.2); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5));">`;
                            } catch(e) {}
                        }

                        el.innerHTML = `${iconHtml}<span>${file.name}</span>`;
                        
                        el.oncontextmenu = (e) => {
                            e.preventDefault();
                            e.stopPropagation();
                            BestOS.state.contextMenuTarget = file;
                            document.getElementById('desktop-context-menu').style.display = 'none';
                            const cm = document.getElementById('item-context-menu');
                            cm.style.display = 'block';
                            cm.style.left = e.clientX + 'px';
                            cm.style.top = e.clientY + 'px';
                        };

                        el.ondblclick = () => {
                            if(file.type === 'folder') { window.currentExpPath = file.id; BestOS.Apps.launch('explorer'); }
                            else if(file.type === 'txt') BestOS.Apps.launchNotes(file);
                            else if(file.type === 'image') BestOS.Apps.launchGallery(file);
                            else if(file.type === 'video') BestOS.Apps.launchVideoPlayer(file);
                            else if(file.type === 'audio') BestOS.Apps.launchAudioPlayer(file);
                            else if(file.type === 'html') BestOS.Apps.launchHTMLViewer(file);
                            else if(file.type === 'pdf') BestOS.Apps.launchPDFViewer(file);
                            else if(file.type === 'quicklink') BestOS.Apps.launch('browser', file.url);
                            else if(file.type === 'app_shortcut') BestOS.Apps.launch(file.appId);
                        };
                        desktop.appendChild(el);
                    });
                    lucide.createIcons();
                },

                toggleStartMenu() {
                    BestOS.UI.closeVPNPanel();
                    BestOS.state.startMenuOpen = !BestOS.state.startMenuOpen;
                    document.getElementById('start-menu').classList.toggle('open');
                },
                closeStartMenu() {
                    BestOS.state.startMenuOpen = false;
                    document.getElementById('start-menu').classList.remove('open');
                },

                toggleVPNPanel() {
                    BestOS.UI.closeStartMenu();
                    BestOS.state.vpnOpen = !BestOS.state.vpnOpen;
                    document.getElementById('vpn-panel').classList.toggle('open');
                },
                closeVPNPanel() {
                    BestOS.state.vpnOpen = false;
                    document.getElementById('vpn-panel').classList.remove('open');
                },

                updateTaskbar() {
                    const tbApps = document.getElementById('taskbar-apps');
                    tbApps.innerHTML = '';
                    Object.entries(BestOS.state.runningApps).forEach(([id, app]) => {
                        const btn = document.createElement('button');
                        btn.className = `tb-btn ${!app.minimized ? 'active' : ''}`;
                        btn.innerHTML = `<i data-lucide="${app.icon}"></i>`;
                        btn.onclick = () => {
                            if(app.minimized) BestOS.WM.restore(id);
                            else BestOS.WM.minimize(id);
                        };
                        tbApps.appendChild(btn);
                    });
                    lucide.createIcons();
                },
                
                toggleTheme() {
                    document.body.classList.toggle('light-mode');
                    localStorage.setItem('bestos_theme', document.body.classList.contains('light-mode') ? 'light' : 'dark');
                }
            },

            // 6. Utility Systems
            notify(message, title = "Notification") {
                const container = document.getElementById('notifications');
                const toast = document.createElement('div');
                toast.className = 'toast';
                toast.innerHTML = `<div style="background:var(--accent); width:8px; height:8px; border-radius:50%;"></div> <div><strong>${title}</strong><br><span style="color:var(--text-muted)">${message}</span></div>`;
                container.appendChild(toast);
                setTimeout(() => {
                    toast.style.animation = 'fadeOut 0.3s forwards';
                    setTimeout(() => toast.remove(), 300);
                }, 4000);
            },
            
            setupShortcuts() {
                document.addEventListener('keydown', (e) => {
                    if(e.ctrlKey && e.key === 'e') { e.preventDefault(); BestOS.Apps.launch('explorer'); }
                    if(e.ctrlKey && e.key === 'b') { e.preventDefault(); BestOS.Apps.launch('browser'); }
                    if(e.ctrlKey && e.key === 'n') { e.preventDefault(); BestOS.Apps.launch('notes'); }
                });
            },

            async boot() {
                await this.Storage.init();
                this.UI.init();
                this.setupShortcuts();
                lucide.createIcons();
                setTimeout(() => this.notify("Welcome to BestOS Platform.", "System Ready"), 1000);
                
                if (!localStorage.getItem('bestos_welcomed')) {
                    setTimeout(() => this.UI.showWelcomeTour(), 1500);
                }
                
                console.log("BestOS booted successfully. Developed by BestTeam.");
            }
        };

        // Initialize OS on load
        window.onload = () => BestOS.boot();

    </script>
</body>
</html>
