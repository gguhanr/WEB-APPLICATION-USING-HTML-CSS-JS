<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark Tool</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <style>
        /* Dark mode support (Tailwind 2.x CDN doesn't include dark: variant by default, so we replicate via .dark class) */
        .dark\:block { display: none; }
        .dark .dark\:block { display: block; }
        .dark\:hidden { display: block; }
        .dark .dark\:hidden { display: none; }
        .dark .dark\:text-yellow-300 { color: #fcd34d; }
        .dark .dark\:text-slate-100 { color: #f1f5f9; }
        .dark .dark\:text-slate-200 { color: #e2e8f0; }
        .dark .dark\:text-slate-300 { color: #cbd5e1; }
        .dark .dark\:text-slate-400 { color: #94a3b8; }
        .dark .dark\:text-white { color: #ffffff; }
        .dark .dark\:text-slate-900 { color: #0f172a; }
        .dark .dark\:bg-slate-800 { background-color: #1e293b; }
        .dark .dark\:bg-slate-700 { background-color: #334155; }
        .dark .dark\:bg-black\/20 { background-color: rgba(0,0,0,0.2); }
        .dark .dark\:bg-black\/30 { background-color: rgba(0,0,0,0.3); }
        .dark .dark\:border-white\/10 { border-color: rgba(255,255,255,0.1); }
        .dark .dark\:border-white\/20 { border-color: rgba(255,255,255,0.2); }
        .dark .dark\:from-indigo-300 { --tw-gradient-from: #a5b4fc; }
        .dark .dark\:to-purple-300 { --tw-gradient-to: #d8b4fe; }
        /* font-sans override */
        .font-sans { font-family: 'Inter', sans-serif; }
    </style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-attachment: fixed;
            transition: background 0.5s ease;
        }

        /* Light Mode Background */
        body:not(.dark) {
            background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 50%, #f3e8ff 100%);
        }

        /* Dark Mode Background */
        .dark body {
            background: linear-gradient(135deg, #0f172a 0%, #312e81 50%, #4c1d95 100%);
        }

        /* Custom range slider styling */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #6366f1;
            cursor: pointer;
            margin-top: -8px;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.4);
            transition: transform 0.1s ease;
        }
        input[type=range]::-webkit-slider-thumb:hover {
            transform: scale(1.1);
        }
        .dark input[type=range]::-webkit-slider-thumb {
            background: #ffffff;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            cursor: pointer;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 4px;
        }
        .dark input[type=range]::-webkit-slider-runnable-track {
            background: rgba(255, 255, 255, 0.2);
        }

        input[type=color] {
            -webkit-appearance: none;
            border: none;
            border-radius: 8px;
            width: 100%;
            height: 44px; /* Touch friendly height */
            padding: 0;
            overflow: hidden;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1);
        }
        .dark input[type=color] {
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.1);
        }
        input[type=color]::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        input[type=color]::-webkit-color-swatch {
            border: none;
            border-radius: 8px;
        }
        
        /* Glassmorphism utilities */
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.05);
            transition: all 0.5s ease;
        }
        .dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .glass-input {
            background: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #1e293b;
            transition: all 0.3s ease;
        }
        .dark .glass-input {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
        }
        .glass-input:focus {
            outline: none;
            border-color: rgba(99, 102, 241, 0.5);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(156, 163, 175, 0.5);
            border-radius: 4px;
        }
        
        /* Canvas grabbing styles */
        #canvas {
            cursor: grab;
        }
        #canvas:active {
            cursor: grabbing;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 dark:text-slate-100 p-4 md:p-8 flex items-center justify-center">

    <!-- Global Drag Overlay -->
    <div id="globalDragOverlay" class="fixed inset-0 z-[100] bg-indigo-900/60 backdrop-blur-sm flex flex-col items-center justify-center hidden opacity-0 transition-opacity duration-300 pointer-events-none">
        <div class="bg-white dark:bg-slate-800 p-10 rounded-3xl shadow-2xl flex flex-col items-center transform scale-95 transition-transform duration-300" id="dragModal">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-20 w-20 text-indigo-500 mb-6 animate-bounce" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
            </svg>
            <p class="text-3xl font-bold text-slate-800 dark:text-white mb-2">Drop Images Here</p>
            <p class="text-slate-500 dark:text-slate-400 text-lg">Add multiple images to your batch instantly</p>
        </div>
    </div>

    <main class="w-full max-w-7xl glass-panel rounded-3xl overflow-hidden flex flex-col lg:flex-row shadow-2xl relative">
        
        <!-- Theme Toggle Button -->
        <button id="themeToggle" class="absolute top-4 right-4 z-50 p-2 rounded-full bg-white/20 dark:bg-black/20 backdrop-blur-md border border-black/5 dark:border-white/10 text-slate-700 dark:text-yellow-300 hover:scale-110 transition-transform">
            <!-- Sun Icon -->
            <svg id="sunIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 hidden dark:block" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
            </svg>
            <!-- Moon Icon -->
            <svg id="moonIcon" xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 block dark:hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
        </button>

        <!-- Left Section: Image Preview & Dropzone -->
        <div class="w-full lg:w-3/5 p-4 sm:p-6 flex flex-col border-b lg:border-b-0 lg:border-r border-black/5 dark:border-white/10 relative">
            
            <header class="mb-4 sm:mb-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                <h1 class="text-2xl md:text-3xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-indigo-600 to-purple-600 dark:from-indigo-300 dark:to-purple-300">
                    Watermark Studio
                </h1>
                <div class="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                    <button id="removeImageBtn" class="hidden cursor-pointer bg-rose-500 hover:bg-rose-600 text-white px-5 py-2.5 rounded-xl font-medium transition-colors shadow-lg shadow-rose-500/30 flex items-center justify-center gap-2 w-full sm:w-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z" clip-rule="evenodd" />
                        </svg>
                        Clear All
                    </button>
                    <!-- MULTIPLE file input enabled here -->
                    <label for="imageUpload" class="cursor-pointer bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-medium transition-colors shadow-lg shadow-indigo-500/30 flex items-center justify-center gap-2 w-full sm:w-auto">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M3 17a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zM6.293 6.707a1 1 0 010-1.414l3-3a1 1 0 011.414 0l3 3a1 1 0 01-1.414 1.414L11 5.414V13a1 1 0 11-2 0V5.414L7.707 6.707a1 1 0 01-1.414 0z" clip-rule="evenodd" />
                        </svg>
                        <span id="uploadText">Upload Images</span>
                    </label>
                </div>
                <input type="file" id="imageUpload" accept="image/*" multiple class="hidden">
            </header>

            <!-- Drag & Drop / Canvas Container -->
            <div id="dropZone" class="relative flex-grow flex items-center justify-center bg-slate-100/50 dark:bg-black/30 rounded-2xl border-2 border-dashed border-slate-300 dark:border-white/20 transition-all duration-300 overflow-hidden min-h-[300px] lg:min-h-[400px]">

                <!-- Placeholder -->
                <div id="uploadPlaceholder" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 dark:text-slate-400 pointer-events-none p-6 text-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mb-4 opacity-50" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <p class="text-lg font-medium">Drag & Drop images here</p>
                    <p class="text-sm opacity-70 mt-1">Select multiple files at once</p>
                </div>

                <!-- Preview Canvas -->
                <canvas id="canvas" class="max-w-full max-h-full object-contain hidden z-10 shadow-lg touch-none"></canvas>
            </div>

            <!-- Thumbnail Gallery Strip -->
            <div id="thumbnailContainer" class="hidden mt-4 pt-2 border-t border-black/5 dark:border-white/10 overflow-x-auto whitespace-nowrap pb-2 flex gap-3 h-24 items-center">
                <!-- Thumbnails injected here via JS -->
            </div>
            <p id="dragHint" class="hidden text-xs text-center text-slate-500 dark:text-slate-400 mt-2">Hint: You can drag the watermark directly on the image.</p>
        </div>

        <!-- Right Section: Controls -->
        <div class="w-full lg:w-2/5 bg-slate-50/50 dark:bg-black/20 flex flex-col" style="min-height:0;">
            <div class="p-4 sm:p-6 lg:p-8 flex flex-col flex-1 overflow-hidden">
            <h2 class="text-xl font-semibold mb-4 text-slate-800 dark:text-slate-200 flex-shrink-0">Watermark Settings</h2>
            
            <div class="space-y-5 sm:space-y-6 flex-1 overflow-y-auto pr-1" style="max-height: calc(100vh - 220px);">
                
            <!-- Watermark Type -->
            <div class="space-y-2">
                <label class="block text-sm font-medium text-slate-700 dark:text-slate-300">Watermark Type</label>
                <div class="flex gap-3">
                    <button id="typeText" onclick="setWatermarkType('text')" class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all bg-indigo-500 text-white shadow-lg shadow-indigo-500/30">✏️ Text</button>
                    <button id="typeIcon" onclick="setWatermarkType('icon')" class="flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all glass-input text-slate-600 dark:text-slate-300">🖼️ Icon</button>
                </div>
            </div>

                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />

    <script>
        // DOM Elements
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const imageUpload = document.getElementById('imageUpload');
        const uploadPlaceholder = document.getElementById('uploadPlaceholder');
        const dropZone = document.getElementById('dropZone');
        const removeImageBtn = document.getElementById('removeImageBtn');
        const uploadText = document.getElementById('uploadText');
        const thumbnailContainer = document.getElementById('thumbnailContainer');
        const dragHint = document.getElementById('dragHint');
        
        // Control Elements
        const watermarkText = document.getElementById('watermarkText');
        const fontSize = document.getElementById('fontSize');
        const fontSizeDisplay = document.getElementById('fontSizeDisplay');
        const fontColor = document.getElementById('fontColor');
        const fontFamily = document.getElementById('fontFamily');
        const blendMode = document.getElementById('blendMode');
        const opacity = document.getElementById('opacity');
        const opacityDisplay = document.getElementById('opacityDisplay');
        const position = document.getElementById('position');
        const themeToggle = document.getElementById('themeToggle');
        
        // Download Buttons
        const downloadCurrentBtn = document.getElementById('downloadCurrentBtn');
        const downloadAllBtn = document.getElementById('downloadAllBtn');
        const batchCount = document.getElementById('batchCount');

        // State variables
        let uploadedImages = []; // Array to store multiple Image objects
        let currentImageIndex = 0;
        
        // Dragging State
        let isDragging = false;
        let customX = 0; 
        let customY = 0;

        const controls = [watermarkText, fontSize, fontColor, fontFamily, blendMode, opacity, position, downloadCurrentBtn, downloadAllBtn];

        // Theme Management
        function initTheme() {
            if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        themeToggle.addEventListener('click', () => {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.theme = 'light';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.theme = 'dark';
            }
        });

        initTheme();

        function updateCanvas() {
            if (uploadedImages.length === 0) return;
            const activeImage = uploadedImages[currentImageIndex].img;

            // Step 1: Draw the base image
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.globalAlpha = 1.0;
            ctx.drawImage(activeImage, 0, 0, canvas.width, canvas.height);

            // Get settings
            const text = watermarkText.value;
            if (!text) return;
            const size = parseInt(fontSize.value, 10);
            const color = fontColor.value;
            const fontStyle = fontFamily.value;
            const blend = blendMode.value;
            const alpha = parseInt(opacity.value, 10) / 100;
            const pos = position.value;

            // Step 2: Draw watermark text onto an offscreen canvas (transparent bg)
            const offscreen = document.createElement('canvas');
            offscreen.width = canvas.width;
            offscreen.height = canvas.height;
            const offCtx = offscreen.getContext('2d');

            offCtx.font = `bold ${size}px '${fontStyle}', sans-serif`;
            offCtx.fillStyle = color;
            offCtx.globalAlpha = 1.0;
            offCtx.textBaseline = 'top';
            offCtx.textAlign = 'left';

            // Add shadow only for normal mode
            if (blend === 'source-over') {
                offCtx.shadowColor = 'rgba(0,0,0,0.5)';
                offCtx.shadowBlur = Math.max(3, size / 8);
                offCtx.shadowOffsetX = Math.max(1, size / 15);
                offCtx.shadowOffsetY = Math.max(1, size / 15);
            }

            const metrics = offCtx.measureText(text);
            const textWidth = metrics.width;
            const textHeight = size;
            const padding = Math.max(20, canvas.width * 0.03);

            if (pos === 'tiled') {
                // Tight diagonal tiling like watermark screenshot
                const gap = Math.max(10, size * 0.6);       // gap between texts
                const xStep = textWidth + gap;
                const yStep = textHeight * 1.8;              // tight vertical spacing
                const diag = Math.sqrt(canvas.width * canvas.width + canvas.height * canvas.height);

                offCtx.save();
                offCtx.translate(canvas.width / 2, canvas.height / 2);
                offCtx.rotate(-Math.PI / 4);

                for (let y = -diag; y < diag; y += yStep) {
                    const rowOffset = (Math.round((y + diag) / yStep) % 2 === 0) ? 0 : xStep / 2;
                    for (let x = -diag; x < diag; x += xStep) {
                        offCtx.fillText(text, x + rowOffset, y);
                    }
                }
                offCtx.restore();
            } else if (pos === 'custom') {
                offCtx.textBaseline = 'middle';
                offCtx.textAlign = 'center';
                offCtx.fillText(text, customX, customY);
            } else {
                let x = 0, y = 0;
                switch (pos) {
                    case 'top-left':     x = padding; y = padding; break;
                    case 'top-right':    x = canvas.width - textWidth - padding; y = padding; break;
                    case 'bottom-left':  x = padding; y = canvas.height - textHeight - padding; break;
                    case 'bottom-right': x = canvas.width - textWidth - padding; y = canvas.height - textHeight - padding; break;
                    case 'center': default:
                        x = (canvas.width - textWidth) / 2;
                        y = (canvas.height - textHeight) / 2;
                        break;
                }
                offCtx.fillText(text, x, y);
            }

            // Step 3: Composite the offscreen watermark layer onto the main canvas with blend mode
            ctx.globalAlpha = alpha;
            ctx.globalCompositeOperation = blend;
            ctx.drawImage(offscreen, 0, 0);

            // Reset
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
        }

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            // Calculate scale based on actual display size vs internal resolution
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            
            let clientX = evt.clientX;
            let clientY = evt.clientY;
            
            // Handle touch events
            if (evt.touches && evt.touches.length > 0) {
                clientX = evt.touches[0].clientX;
                clientY = evt.touches[0].clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        }

        function handleDragStart(e) {
            if (uploadedImages.length === 0) return;
            isDragging = true;
            
            // Auto-switch to custom position mode when user touches canvas
            if (watermarkType === 'icon') {
                if (document.getElementById('iconPosition').value !== 'custom') {
                    document.getElementById('iconPosition').value = 'custom';
                }
            } else if (position.value !== 'custom') {
                position.value = 'custom';
            }
            
            const pos = getMousePos(e);
            customX = pos.x;
            customY = pos.y;
            updateCanvas();
        }

        function handleDragMove(e) {
            if (!isDragging) return;
            
            // Prevent scrolling while dragging watermark on mobile
            if(e.type === 'touchmove') e.preventDefault();
            
            const pos = getMousePos(e);
            customX = pos.x;
            customY = pos.y;
            updateCanvas();
        }

        function handleDragEnd() {
            isDragging = false;
        }

        // Attach drag events to Canvas
        canvas.addEventListener('mousedown', handleDragStart);
        canvas.addEventListener('mousemove', handleDragMove);
        window.addEventListener('mouseup', handleDragEnd);
        
        canvas.addEventListener('touchstart', handleDragStart, {passive: false});
        canvas.addEventListener('touchmove', handleDragMove, {passive: false});
        window.addEventListener('touchend', handleDragEnd);

        function renderThumbnails() {
            thumbnailContainer.innerHTML = '';
            if (uploadedImages.length <= 1) {
                thumbnailContainer.classList.add('hidden');
            } else {
                thumbnailContainer.classList.remove('hidden');
                uploadedImages.forEach((item, index) => {
                    const thumb = document.createElement('div');
                    thumb.className = `w-16 h-16 rounded-lg cursor-pointer bg-cover bg-center flex-shrink-0 transition-all duration-200 border-2 ${index === currentImageIndex ? 'border-indigo-500 scale-105 shadow-md' : 'border-transparent opacity-60 hover:opacity-100'}`;
                    thumb.style.backgroundImage = `url(${item.src})`;
                    thumb.onclick = () => {
                        currentImageIndex = index;
                        setupCanvasForCurrentImage();
                        renderThumbnails();
                    };
                    thumbnailContainer.appendChild(thumb);
                });
            }
        }

        function setupCanvasForCurrentImage() {
            if (uploadedImages.length === 0) return;
            const img = uploadedImages[currentImageIndex].img;
            
            canvas.width = img.width;
            canvas.height = img.height;
            
            // Initialize custom position to center for new images
            customX = canvas.width / 2;
            customY = canvas.height / 2;

            updateCanvas();
        }

        function processFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (event) => {
                    const img = new Image();
                    img.onload = () => {
                        // Downscale massive images to prevent browser crashing
                        const MAX_DIMENSION = 3000;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_DIMENSION || height > MAX_DIMENSION) {
                            const ratio = Math.min(MAX_DIMENSION / width, MAX_DIMENSION / height);
                            width = Math.round(width * ratio);
                            height = Math.round(height * ratio);
                        }
                        
                        // Save a scaled version into memory
                        const tempCanvas = document.createElement('canvas');
                        tempCanvas.width = width;
                        tempCanvas.height = height;
                        const tCtx = tempCanvas.getContext('2d');
                        tCtx.drawImage(img, 0, 0, width, height);
                        
                        const scaledImg = new Image();
                        scaledImg.onload = () => {
                            resolve({
                                img: scaledImg,
                                src: tempCanvas.toDataURL('image/jpeg', 0.8), // Using data URL for thumbnail display
                                originalName: file.name
                            });
                        };
                        scaledImg.src = tempCanvas.toDataURL('image/png');
                    };
                    img.onerror = reject;
                    img.src = event.target.result;
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        async function handleMultipleFiles(inputFiles) {
            if (!inputFiles || inputFiles.length === 0) return;
            
            // CRITICAL FIX: Snapshot the file list immediately into a static array!
            // Otherwise, clearing the input asynchronously destroys the live FileList.
            const files = Array.from(inputFiles);
            
            // Show loading state...
            const originalText = uploadText.textContent;
            uploadText.textContent = "Processing...";
            
            // Allow browser to render the "Processing..." text before locking the thread with image work
            await new Promise(r => setTimeout(r, 50));
            
            for (let i = 0; i < files.length; i++) {
                try {
                    // Quick check if it might be an image based on native file object
                    const imageObj = await processFile(files[i]);
                    uploadedImages.push(imageObj);
                } catch (e) {
                    console.error("Skipped unreadable file", e);
                }
            }

            if (uploadedImages.length > 0) {
                // Update UI state
                uploadPlaceholder.classList.add('hidden');
                dropZone.classList.remove('border-dashed');
                canvas.classList.remove('hidden');
                removeImageBtn.classList.remove('hidden');
                dragHint.classList.remove('hidden');
                uploadText.textContent = 'Add More Images';
                
                // Show batch download button if multiple files
                if (uploadedImages.length > 1) {
                    downloadAllBtn.classList.remove('hidden');
                    batchCount.textContent = uploadedImages.length;
                } else {
                    downloadAllBtn.classList.add('hidden');
                }

                // Enable controls
                controls.forEach(ctrl => ctrl.removeAttribute('disabled'));
                
                renderThumbnails();
                setupCanvasForCurrentImage();
            } else {
                uploadText.textContent = "Error Loading Images";
                setTimeout(() => uploadText.textContent = originalText, 2000);
            }
        }

        // File Input Handler
        imageUpload.addEventListener('change', (e) => {
            handleMultipleFiles(e.target.files);
            e.target.value = ''; // Reset
        });

        // Clear All Data
        removeImageBtn.addEventListener('click', () => {
            uploadedImages = [];
            currentImageIndex = 0;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            canvas.width = 0;
            canvas.height = 0;
            
            // Reset UI state
            uploadPlaceholder.classList.remove('hidden');
            dropZone.classList.add('border-dashed');
            canvas.classList.add('hidden');
            removeImageBtn.classList.add('hidden');
            thumbnailContainer.classList.add('hidden');
            dragHint.classList.add('hidden');
            downloadAllBtn.classList.add('hidden');
            uploadText.textContent = 'Upload Images';
            
            // Disable controls
            controls.forEach(ctrl => ctrl.setAttribute('disabled', 'true'));
        });

        // Drag & Drop Handlers - FULL PAGE MULTIPLE UPLOAD
        let dragCounter = 0;
        const globalDragOverlay = document.getElementById('globalDragOverlay');
        const dragModal = document.getElementById('dragModal');

        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            document.body.addEventListener(eventName, e => { e.preventDefault(); e.stopPropagation(); }, false);
        });

        document.body.addEventListener('dragenter', (e) => {
            // Ignore drags that aren't actual files (like dragging highlighted text)
            if (e.dataTransfer.types && !e.dataTransfer.types.includes('Files')) return;
            
            dragCounter++;
            if (dragCounter === 1) {
                globalDragOverlay.classList.remove('hidden');
                // Small delay to allow display:block to apply before changing opacity for smooth CSS transition
                requestAnimationFrame(() => {
                    globalDragOverlay.classList.remove('opacity-0');
                    dragModal.classList.remove('scale-95');
                    dragModal.classList.add('scale-100');
                });
            }
        });

        document.body.addEventListener('dragleave', (e) => {
            if (e.dataTransfer.types && !e.dataTransfer.types.includes('Files')) return;

            dragCounter--;
            if (dragCounter <= 0) {
                dragCounter = 0;
                hideDragOverlay();
            }
        });

        document.body.addEventListener('drop', (e) => {
            dragCounter = 0;
            hideDragOverlay();
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleMultipleFiles(e.dataTransfer.files);
            }
        });

        function hideDragOverlay() {
            globalDragOverlay.classList.add('opacity-0');
            dragModal.classList.remove('scale-100');
            dragModal.classList.add('scale-95');
            setTimeout(() => {
                if (dragCounter === 0) {
                    globalDragOverlay.classList.add('hidden');
                }
            }, 300);
        }

        // Control Listeners
        watermarkText.addEventListener('input', updateCanvas);
        fontFamily.addEventListener('change', updateCanvas);
        blendMode.addEventListener('change', updateCanvas);
        fontColor.addEventListener('input', updateCanvas);
        position.addEventListener('change', updateCanvas);
        
        fontSize.addEventListener('input', (e) => {
            fontSizeDisplay.textContent = `${e.target.value}px`;
            updateCanvas();
        });
        
        opacity.addEventListener('input', (e) => {
            opacityDisplay.textContent = `${e.target.value}%`;
            updateCanvas();
        });

        // Download Logic
        function triggerDownload(fileName) {
            // Create an offscreen canvas with white background to avoid black PNG export
            const exportCanvas = document.createElement('canvas');
            exportCanvas.width = canvas.width;
            exportCanvas.height = canvas.height;
            const exportCtx = exportCanvas.getContext('2d');
            exportCtx.fillStyle = '#ffffff';
            exportCtx.fillRect(0, 0, exportCanvas.width, exportCanvas.height);
            exportCtx.drawImage(canvas, 0, 0);

            const link = document.createElement('a');
            link.download = fileName;
            link.href = exportCanvas.toDataURL('image/png');

            document.body.removeChild(link);
        }

        downloadCurrentBtn.addEventListener('click', () => {
            if (uploadedImages.length === 0) return;
            const originalName = uploadedImages[currentImageIndex].originalName.split('.')[0] || 'image';
            triggerDownload(`watermarked_${originalName}_${Date.now()}.png`);
        });

        downloadAllBtn.addEventListener('click', async () => {
            if (uploadedImages.length === 0) return;
            
            // Temporarily disable buttons
            downloadAllBtn.setAttribute('disabled', 'true');
            downloadAllBtn.innerHTML = 'Processing Batch...';

            const startIndex = currentImageIndex;

            // Loop and sequentially download
            for (let i = 0; i < uploadedImages.length; i++) {
                currentImageIndex = i;
                setupCanvasForCurrentImage();
                
                // Slight delay to ensure canvas renders and browser UI doesn't freeze
                await new Promise(r => setTimeout(r, 300));
                
                const originalName = uploadedImages[i].originalName.split('.')[0] || 'image';
                triggerDownload(`watermarked_${originalName}_${Date.now()}.png`);
            }

            setupCanvasForCurrentImage();

        ];

        let watermarkType = 'text'; // 'text' or 'icon'
        let selectedIconIndex = 0;
        const preloadedIcons = [];

        // Preload icon images
        PRESET_ICONS.forEach((ic, i) => {
            const img = new Image();
            img.src = ic.src;
            preloadedIcons.push(img);
        });

        function setWatermarkType(type) {
            watermarkType = type;
            const textBtn = document.getElementById('typeText');
            const iconBtn = document.getElementById('typeIcon');
            const iconSection = document.getElementById('iconSelectorSection');
            const textControls = document.getElementById('textWatermarkControls');

            if (type === 'text') {
                textBtn.className = 'flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all bg-indigo-500 text-white shadow-lg shadow-indigo-500/30';
                iconBtn.className = 'flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all glass-input text-slate-600 dark:text-slate-300';
                iconSection.classList.add('hidden');
                textControls.classList.remove('hidden');
            } else {
                iconBtn.className = 'flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all bg-indigo-500 text-white shadow-lg shadow-indigo-500/30';
                textBtn.className = 'flex-1 py-2.5 rounded-xl font-semibold text-sm transition-all glass-input text-slate-600 dark:text-slate-300';
                iconSection.classList.remove('hidden');
                textControls.classList.add('hidden');
            }
            updateCanvas();
        }

        function selectIcon(index) {
            selectedIconIndex = index;
            // Update all icon option borders dynamically
            PRESET_ICONS.forEach((ic, i) => {
                const el = document.getElementById('iconOpt' + (i + 1));
                if (el) el.style.borderColor = (i === index) ? 'rgb(99,102,241)' : 'transparent';
            });
            updateCanvas();
        }

        // Patch updateCanvas to support icon mode
        const _origUpdateCanvas = updateCanvas;
        updateCanvas = function() {
            if (watermarkType === 'icon') {
                drawIconWatermark();
            } else {
                _origUpdateCanvas();
            }
        };

        function removeBlackBackground(img, w, h) {
            const offscreen = document.createElement('canvas');
            offscreen.width = w;
            offscreen.height = h;
            const offCtx = offscreen.getContext('2d');
            offCtx.drawImage(img, 0, 0, w, h);
            const imageData = offCtx.getImageData(0, 0, w, h);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                // Calculate brightness - darker pixels become more transparent
                const brightness = (r + g + b) / 3;
                const threshold = 60; // pixels darker than this become fully transparent
                const fadeRange = 120; // pixels between threshold and this fade gradually
                if (brightness < threshold) {
                    data[i+3] = 0; // fully transparent
                } else if (brightness < fadeRange) {
                    // Gradual fade for edge pixels
                    data[i+3] = Math.round(((brightness - threshold) / (fadeRange - threshold)) * 255);
                }
                // Bright pixels keep full opacity
            }
            offCtx.putImageData(imageData, 0, 0);
            return offscreen;
        }

        function drawIconWatermark() {
            if (uploadedImages.length === 0) return;
            const activeImage = uploadedImages[currentImageIndex].img;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            ctx.drawImage(activeImage, 0, 0, canvas.width, canvas.height);

            const iconImg = preloadedIcons[selectedIconIndex];
            if (!iconImg.complete || iconImg.naturalWidth === 0) {
                iconImg.onload = () => drawIconWatermark();
                return;
            }

            const sizePercent = parseInt(document.getElementById('iconSize').value, 10) / 100;
            const blend = document.getElementById('iconBlendMode').value;
            const alpha = parseInt(document.getElementById('iconOpacity').value, 10) / 100;
            const pos = document.getElementById('iconPosition').value;

            // Compute icon draw size preserving aspect ratio
            const iconW = canvas.width * sizePercent;
            const iconH = (iconImg.naturalHeight / iconImg.naturalWidth) * iconW;

            // Remove black background from icon
            const cleanIcon = removeBlackBackground(iconImg, Math.round(iconW), Math.round(iconH));

            const padding = Math.max(20, canvas.width * 0.03);
            let x = 0, y = 0;

            if (pos === 'custom') {
                x = customX - iconW / 2;
                y = customY - iconH / 2;
            } else if (pos === 'tiled') {
                ctx.globalAlpha = alpha;
                ctx.globalCompositeOperation = blend;
                const xStep = iconW + padding * 2;
                const yStep = iconH + padding * 2;
                for (let ty = 0; ty < canvas.height + iconH; ty += yStep) {
                    const rowOff = (Math.round(ty / yStep) % 2 === 0) ? 0 : xStep / 2;
                    for (let tx = -xStep; tx < canvas.width + iconW; tx += xStep) {
                        ctx.drawImage(cleanIcon, tx + rowOff, ty, iconW, iconH);
                    }
                }
                ctx.globalAlpha = 1.0;
                ctx.globalCompositeOperation = 'source-over';
                return;
            } else {
                switch (pos) {
                    case 'top-left': x = padding; y = padding; break;
                    case 'top-right': x = canvas.width - iconW - padding; y = padding; break;
                    case 'bottom-left': x = padding; y = canvas.height - iconH - padding; break;
                    case 'bottom-right': x = canvas.width - iconW - padding; y = canvas.height - iconH - padding; break;
                    case 'center': default: x = (canvas.width - iconW) / 2; y = (canvas.height - iconH) / 2; break;
                }
            }

            ctx.globalAlpha = alpha;
            ctx.globalCompositeOperation = blend;
            ctx.drawImage(cleanIcon, x, y, iconW, iconH);
            ctx.globalAlpha = 1.0;
            ctx.globalCompositeOperation = 'source-over';
        }
        // ===================== END ICON WATERMARK SYSTEM =====================
