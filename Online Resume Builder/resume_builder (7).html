<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BEST_RESUME</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Add html2pdf library for direct PDF downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <!-- Add html2canvas library for PNG downloading -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Dynamic Theme Color */
            --theme-color: #d97743; 
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f0ece6;
            -webkit-tap-highlight-color: transparent;
        }
        
        .font-serif-name {
            font-family: 'Playfair Display', serif;
        }

        /* Modern PC-style Custom Scrollbar */
        * {
            scrollbar-width: thin;
            scrollbar-color: #cbd5e1 #f8fafc;
        }
        
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f8fafc;
        }
        
        ::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
            /* Creates an inset padding effect around the scrollbar thumb */
            border: 3px solid #f8fafc; 
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background-color: #94a3b8;
        }

        /* Print Styles - crucial for exporting to PDF */
        @media print {
            body { 
                background: white; 
                margin: 0; 
                padding: 0;
            }
            #header-bar, #editor-panel, #mobile-nav { 
                display: none !important; 
            }
            #preview-panel {
                width: 100% !important;
                padding: 0 !important;
                background: white !important;
                overflow: visible !important;
                height: auto !important;
                display: block !important;
            }
            #resume-preview {
                box-shadow: none !important;
                width: 100% !important;
                max-width: 100% !important;
                margin: 0 !important;
                padding: 20mm !important; 
            }
            #resume-preview.tpl-creative {
                padding: 0 !important; /* Creative template needs flush edges */
            }
            * {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
            @page {
                size: A4;
                margin: 0;
            }
        }
    
        /* Classic Template Styles */
        .tpl-classic .section-title {
            color: var(--theme-color);
            border-bottom: 1px solid var(--theme-color);
            padding-bottom: 8px;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            font-weight: 600;
        }

        /* Modern Template Styles */
        .tpl-modern .section-title {
            color: #111;
            border-left: 4px solid var(--theme-color);
            padding-left: 10px;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
            font-weight: 700;
        }

        /* Minimal Template Styles */
        .tpl-minimal .section-title {
            color: var(--theme-color);
            margin-bottom: 12px;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            font-weight: 700;
        }

        /* Creative Template Styles */
        .tpl-creative .section-title {
            color: var(--theme-color);
            border-bottom: 2px solid var(--theme-color);
            padding-bottom: 6px;
            margin-bottom: 16px;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            font-weight: 800;
        }

        .tab-active {
            color: var(--theme-color) !important;
            border-bottom-color: var(--theme-color) !important;
        }

        /* Hide scrollbar for mobile tabs */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none !important;
        }
        
        .template-card.active {
            border-color: var(--theme-color);
            background-color: #fffaf5;
            box-shadow: 0 0 0 2px var(--theme-color) inset;
        }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden pb-[60px] md:pb-0">

    <!-- Header / Navbar -->
    <header id="header-bar" class="bg-[#1a1714] px-4 md:px-6 py-3 flex justify-between items-center shadow-sm z-20 shrink-0">
        <div class="flex items-center gap-2">
            <svg class="w-5 h-5 md:w-6 md:h-6 text-[var(--theme-color)]" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
            <h1 class="text-lg md:text-xl font-bold text-white">BEST_<span class="text-[var(--theme-color)]">RESUME</span></h1>
        </div>
        <div class="flex gap-2 md:gap-3">
            <button onclick="downloadWord()" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded text-xs md:text-sm font-medium transition flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span class="hidden sm:inline">Word</span>
            </button>
            <button id="png-btn" onclick="downloadPNG()" class="bg-green-600 hover:bg-green-700 text-white px-3 py-1.5 rounded text-xs md:text-sm font-medium transition flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                <span class="hidden sm:inline">PNG</span>
            </button>
            <button id="pdf-btn" onclick="downloadPDF()" class="bg-[var(--theme-color)] hover:opacity-90 text-white px-3 py-1.5 rounded text-xs md:text-sm font-medium transition flex items-center gap-1.5">
                <svg class="w-3.5 h-3.5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                <span class="hidden sm:inline">PDF</span>
            </button>
        </div>
    </header>

    <!-- Main Workspace -->
    <main class="flex flex-1 flex-row overflow-hidden relative">
        
        <!-- Editor Panel (Left) -->
        <section id="editor-panel" class="w-full md:w-[450px] shrink-0 bg-white border-r border-gray-200 flex flex-col z-10 shadow-[4px_0_24px_rgba(0,0,0,0.02)] h-full overflow-hidden">
            
            <!-- Tabs -->
            <div class="flex border-b border-gray-200 text-[11px] font-bold text-gray-400 uppercase overflow-x-auto whitespace-nowrap scrollbar-hide shrink-0">
                <button onclick="switchTab('templates')" id="tab-templates" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Templates</button>
                <button onclick="switchTab('basics')" id="tab-basics" class="tab-btn tab-active px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Basics</button>
                <button onclick="switchTab('experience')" id="tab-experience" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Experience</button>
                <button onclick="switchTab('education')" id="tab-education" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Education</button>
                <button onclick="switchTab('projects')" id="tab-projects" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Projects</button>
                <button onclick="switchTab('achievements')" id="tab-achievements" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Achievements</button>
                <button onclick="switchTab('skills')" id="tab-skills" class="tab-btn px-4 py-4 border-b-2 border-transparent hover:text-gray-700 transition flex-1">Skills</button>
            </div>

            <!-- Scrollable Content -->
            <div class="flex-1 overflow-y-auto p-5 md:p-6 pb-20 md:pb-6">
                
                <!-- TAB: Templates -->
                <div id="content-templates" class="tab-content hidden space-y-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-4">Choose a Template</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <!-- Template: Classic -->
                        <div id="tpl-card-classic" onclick="setTemplate('classic')" class="template-card active cursor-pointer border border-gray-200 rounded-lg p-3 text-center transition hover:shadow-md">
                            <div class="w-full h-28 bg-gray-50 mb-3 border border-gray-100 rounded flex flex-col items-center justify-center p-2">
                                <div class="w-4 h-4 rounded-full bg-gray-300 mb-1"></div>
                                <div class="w-16 h-1 bg-gray-400 mb-1"></div>
                                <div class="w-8 h-0.5 bg-[var(--theme-color)] mb-3"></div>
                                <div class="w-full h-0.5 bg-gray-200 mb-1"></div>
                                <div class="w-full h-0.5 bg-gray-200 mb-1"></div>
                            </div>
                            <span class="text-sm font-bold text-gray-700">Classic Serif</span>
                        </div>

                        <!-- Template: Modern -->
                        <div id="tpl-card-modern" onclick="setTemplate('modern')" class="template-card cursor-pointer border border-gray-200 rounded-lg p-3 text-center transition hover:shadow-md">
                            <div class="w-full h-28 bg-gray-50 mb-3 border border-gray-100 rounded flex flex-col items-start p-2 relative">
                                <div class="w-16 h-1 bg-gray-400 mb-1"></div>
                                <div class="w-10 h-0.5 bg-[var(--theme-color)] mb-3"></div>
                                <div class="absolute top-2 right-2 w-6 h-6 rounded bg-gray-300"></div>
                                <div class="flex w-full gap-2 mb-1">
                                    <div class="w-1 h-4 bg-[var(--theme-color)]"></div>
                                    <div class="flex-1 flex flex-col gap-1 mt-0.5">
                                        <div class="w-3/4 h-0.5 bg-gray-200"></div>
                                        <div class="w-1/2 h-0.5 bg-gray-200"></div>
                                    </div>
                                </div>
                            </div>
                            <span class="text-sm font-bold text-gray-700">Modern Line</span>
                        </div>

                        <!-- Template: Minimal -->
                        <div id="tpl-card-minimal" onclick="setTemplate('minimal')" class="template-card cursor-pointer border border-gray-200 rounded-lg p-3 text-center transition hover:shadow-md">
                            <div class="w-full h-28 bg-gray-50 mb-3 border border-gray-100 rounded flex flex-col items-start p-2">
                                <div class="flex justify-between w-full mb-2 border-b border-gray-200 pb-1">
                                    <div class="flex flex-col gap-1">
                                        <div class="w-10 h-1 bg-[var(--theme-color)]"></div>
                                        <div class="w-6 h-0.5 bg-gray-400"></div>
                                    </div>
                                    <div class="w-5 h-5 rounded-full bg-gray-300"></div>
                                </div>
                                <div class="w-full h-0.5 bg-gray-200 mb-1"></div>
                                <div class="w-1/2 h-0.5 bg-gray-200"></div>
                            </div>
                            <span class="text-sm font-bold text-gray-700">Minimal Compact</span>
                        </div>

                        <!-- Template: Creative -->
                        <div id="tpl-card-creative" onclick="setTemplate('creative')" class="template-card cursor-pointer border border-gray-200 rounded-lg p-3 text-center transition hover:shadow-md">
                            <div class="w-full h-28 bg-white mb-3 border border-gray-100 rounded flex overflow-hidden">
                                <div class="w-1/3 h-full bg-[var(--theme-color)] p-1 flex flex-col items-center pt-3">
                                    <div class="w-5 h-5 rounded-full bg-white/50 mb-2"></div>
                                    <div class="w-full h-0.5 bg-white/50 mb-1"></div>
                                    <div class="w-full h-0.5 bg-white/50"></div>
                                </div>
                                <div class="w-2/3 h-full p-2 flex flex-col items-start pt-3">
                                    <div class="w-10 h-1 bg-gray-400 mb-2"></div>
                                    <div class="w-full h-0.5 bg-gray-200 mb-1"></div>
                                    <div class="w-3/4 h-0.5 bg-gray-200"></div>
                                </div>
                            </div>
                            <span class="text-sm font-bold text-gray-700">Creative Sidebar</span>
                        </div>
                    </div>
                </div>

                <!-- TAB: Basics -->
                <div id="content-basics" class="tab-content space-y-6">
                    
                    <div class="flex flex-col md:flex-row gap-6 border-b border-gray-100 pb-5">
                        <!-- Profile Photo Picker -->
                        <div class="flex-1">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Profile Photo</label>
                            <div class="flex flex-col items-start gap-2">
                                <label class="cursor-pointer bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 py-1.5 px-3 rounded text-[13px] font-medium transition shadow-sm w-full text-center md:w-auto">
                                    <span>Upload Image</span>
                                    <input type="file" id="inp-photo" accept="image/*" onchange="handlePhotoUpload(event)" class="hidden">
                                </label>
                                <button onclick="removePhoto()" class="text-[11px] text-red-500 hover:text-red-700 hidden font-semibold px-1" id="btn-remove-photo">Remove Photo</button>
                            </div>
                        </div>

                        <!-- Theme Color Picker -->
                        <div class="flex-1 border-t md:border-t-0 md:border-l border-gray-100 pt-4 md:pt-0 md:pl-6">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-2">Theme Color</label>
                            <div class="flex items-center gap-3">
                                <input type="color" id="inp-color" oninput="updateThemeColor(this.value)" value="#d97743" class="w-8 h-8 p-0 border-0 rounded cursor-pointer shadow-sm shrink-0">
                                <div class="flex gap-1.5 flex-wrap">
                                    <button onclick="updateThemeColor('#d97743')" class="w-5 h-5 rounded-full bg-[#d97743] shadow-sm hover:scale-110 transition-transform" title="Orange"></button>
                                    <button onclick="updateThemeColor('#2563eb')" class="w-5 h-5 rounded-full bg-blue-600 shadow-sm hover:scale-110 transition-transform" title="Blue"></button>
                                    <button onclick="updateThemeColor('#16a34a')" class="w-5 h-5 rounded-full bg-green-600 shadow-sm hover:scale-110 transition-transform" title="Green"></button>
                                    <button onclick="updateThemeColor('#9333ea')" class="w-5 h-5 rounded-full bg-purple-600 shadow-sm hover:scale-110 transition-transform" title="Purple"></button>
                                    <button onclick="updateThemeColor('#e11d48')" class="w-5 h-5 rounded-full bg-rose-600 shadow-sm hover:scale-110 transition-transform" title="Rose"></button>
                                    <button onclick="updateThemeColor('#1f2937')" class="w-5 h-5 rounded-full bg-gray-800 shadow-sm hover:scale-110 transition-transform" title="Dark"></button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-4">Personal Information</h2>
                    
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">First Name</label>
                            <input type="text" id="inp-firstname" oninput="updateState('firstName', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Last Name</label>
                            <input type="text" id="inp-lastname" oninput="updateState('lastName', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Professional Title</label>
                        <input type="text" id="inp-title" oninput="updateState('title', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Email</label>
                        <input type="email" id="inp-email" oninput="updateState('email', this.value)" class="w-full p-2.5 text-sm bg-blue-50 border border-blue-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Phone</label>
                            <input type="text" id="inp-phone" oninput="updateState('phone', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Location</label>
                            <input type="text" id="inp-location" oninput="updateState('location', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">LinkedIn</label>
                            <input type="text" id="inp-linkedin" oninput="updateState('linkedin', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Website / Portfolio</label>
                            <input type="text" id="inp-website" oninput="updateState('website', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">GitHub</label>
                            <input type="text" id="inp-github" oninput="updateState('github', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Date of Birth</label>
                            <input type="text" id="inp-dob" placeholder="e.g. 01/01/1990" oninput="updateState('dob', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                        </div>
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Nationality / Status</label>
                        <input type="text" id="inp-nationality" placeholder="e.g. American / Single" oninput="updateState('nationality', this.value)" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition">
                    </div>

                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Professional Summary</label>
                        <textarea id="inp-summary" placeholder="A brief statement about your professional identity..." oninput="updateState('summary', this.value)" rows="4" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition resize-y"></textarea>
                    </div>
                </div>

                <!-- TAB: Experience -->
                <div id="content-experience" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Work Experience</h2>
                        <button onclick="addExp()" class="text-xs text-[var(--theme-color)] hover:opacity-75 font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="experience-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Education -->
                <div id="content-education" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Education</h2>
                        <button onclick="addEdu()" class="text-xs text-[var(--theme-color)] hover:opacity-75 font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="education-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Projects -->
                <div id="content-projects" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Projects</h2>
                        <button onclick="addProject()" class="text-xs text-[var(--theme-color)] hover:opacity-75 font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="projects-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Achievements -->
                <div id="content-achievements" class="tab-content hidden space-y-6">
                    <div class="flex justify-between items-center">
                        <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide">Achievements</h2>
                        <button onclick="addAchievement()" class="text-xs text-[var(--theme-color)] hover:opacity-75 font-bold flex items-center gap-1">+ Add New</button>
                    </div>
                    <div id="achievements-editor-container" class="space-y-4"></div>
                </div>

                <!-- TAB: Skills -->
                <div id="content-skills" class="tab-content hidden space-y-6">
                    <h2 class="text-xs font-bold text-gray-500 uppercase tracking-wide mb-4">Skills & Additional</h2>
                    
                    <div>
                        <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider mb-1">Skills (Comma Separated)</label>
                        <textarea id="inp-skills" oninput="updateState('skills', this.value)" rows="3" class="w-full p-2.5 text-sm bg-white border border-gray-200 rounded-md focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none transition resize-none"></textarea>
                    </div>

                    <div class="mt-6 border-t border-gray-100 pt-6">
                        <div class="flex justify-between items-center mb-4">
                            <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-wider">Additional Sections</label>
                            <button onclick="addAdditional()" class="text-xs text-[var(--theme-color)] hover:opacity-75 font-bold flex items-center gap-1">+ Add New</button>
                        </div>
                        <div id="additional-editor-container" class="space-y-4"></div>
                    </div>
                </div>

            </div>
        </section>

        <!-- Live Preview Panel (Right) -->
        <section id="preview-panel" class="hidden md:flex w-full md:w-auto flex-1 bg-[#f0ece6] overflow-y-auto flex-col items-center pb-24 md:pb-12 h-full">
            
            <!-- Preview Control Bar -->
            <div class="w-full max-w-[21cm] mt-4 md:mt-6 px-4 py-2 bg-white rounded flex justify-between items-center border border-gray-200 shadow-sm print:hidden shrink-0">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest hidden sm:inline">Live Preview</span>
                <div class="flex items-center gap-3 w-full sm:w-auto justify-center sm:justify-end">
                    <button onclick="adjustZoom(-0.1)" class="text-gray-400 hover:text-[var(--theme-color)] transition outline-none p-2 md:p-0" title="Zoom Out">
                        <svg class="w-5 h-5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM13 10H7"></path></svg>
                    </button>
                    <input type="range" id="zoom-slider" min="0.3" max="1.5" step="0.05" value="0.85" oninput="setZoom(this.value)" class="w-32 md:w-24 h-1.5 md:h-1 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-[var(--theme-color)]">
                    <button onclick="adjustZoom(0.1)" class="text-gray-400 hover:text-[var(--theme-color)] transition outline-none p-2 md:p-0" title="Zoom In">
                        <svg class="w-5 h-5 md:w-4 md:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v6m3-3H7"></path></svg>
                    </button>
                    <span id="zoom-level-text" class="text-xs font-bold text-gray-500 w-10 text-right hidden md:inline">85%</span>
                </div>
            </div>

            <!-- Scalable Wrapper -->
            <div class="w-full max-w-[21cm] origin-top mt-4 mb-10 shrink-0">
                <div id="preview-wrapper" class="w-full transform-origin-top transition-transform duration-300 origin-top" style="transform: scale(0.85);">
                    <!-- A4 Document Container -->
                    <div id="resume-preview" class="bg-white shadow-md w-full min-h-[29.7cm] p-10 md:p-16 text-gray-800 text-sm leading-relaxed tpl-classic">
                        <!-- Preview Content Injected Here via JS -->
                    </div>
                </div>
            </div>

        </section>
    </main>

    <!-- Mobile Bottom Navigation (Visible only on small screens) -->
    <nav id="mobile-nav" class="md:hidden fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 z-50 flex shadow-[0_-4px_10px_rgba(0,0,0,0.05)]">
        <button onclick="toggleMobileView('editor')" id="nav-btn-editor" class="flex-1 py-3 text-center text-sm font-bold text-[var(--theme-color)] border-t-2 border-[var(--theme-color)] bg-orange-50/30 flex justify-center items-center gap-2 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
            Edit
        </button>
        <button onclick="toggleMobileView('preview')" id="nav-btn-preview" class="flex-1 py-3 text-center text-sm font-bold text-gray-500 border-t-2 border-transparent hover:bg-gray-50 flex justify-center items-center gap-2 transition">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
            Preview
        </button>
    </nav>

    <script>
        // --- State Management ---
        const state = {
            template: 'classic', // classic | modern | minimal | creative
            themeColor: '#d97743',
            photo: '', // Base64 Image URL
            firstName: '',
            lastName: '',
            title: '',
            email: '',
            phone: '',
            location: '',
            linkedin: '',
            website: '',
            github: '',
            dob: '',
            nationality: '',
            summary: '',
            experiences: [],
            educations: [],
            skills: '',
            additionals: [],
            projects: [],
            achievements: []
        };

        // --- Mobile View Toggle Logic ---
        let mobileView = 'editor';

        function toggleMobileView(view) {
            mobileView = view;
            const editorPanel = document.getElementById('editor-panel');
            const previewPanel = document.getElementById('preview-panel');
            const btnEditor = document.getElementById('nav-btn-editor');
            const btnPreview = document.getElementById('nav-btn-preview');

            if (view === 'editor') {
                editorPanel.classList.remove('hidden');
                previewPanel.classList.add('hidden');
                
                // Update Nav UI
                btnEditor.classList.add('text-[var(--theme-color)]', 'border-[var(--theme-color)]', 'bg-orange-50/30');
                btnEditor.classList.remove('text-gray-500', 'border-transparent');
                
                btnPreview.classList.add('text-gray-500', 'border-transparent');
                btnPreview.classList.remove('text-[var(--theme-color)]', 'border-[var(--theme-color)]', 'bg-orange-50/30');
            } else {
                editorPanel.classList.add('hidden');
                previewPanel.classList.remove('hidden');
                previewPanel.classList.add('flex'); // Ensure flex display
                
                // Update Nav UI
                btnPreview.classList.add('text-[var(--theme-color)]', 'border-[var(--theme-color)]', 'bg-orange-50/30');
                btnPreview.classList.remove('text-gray-500', 'border-transparent');
                
                btnEditor.classList.add('text-gray-500', 'border-transparent');
                btnEditor.classList.remove('text-[var(--theme-color)]', 'border-[var(--theme-color)]', 'bg-orange-50/30');

                // Recalculate zoom to fit the mobile screen exactly
                setTimeout(autoScalePreview, 50); 
            }
        }

        // --- UI Interaction Functions ---
        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('tab-active'));
            document.getElementById(`tab-${tabId}`).classList.add('tab-active');

            document.querySelectorAll('.tab-content').forEach(content => content.classList.add('hidden'));
            document.getElementById(`content-${tabId}`).classList.remove('hidden');
        }

        function setTemplate(temp) {
            state.template = temp;
            
            document.querySelectorAll('.template-card').forEach(c => c.classList.remove('active'));
            document.getElementById(`tpl-card-${temp}`).classList.add('active');
            
            const preview = document.getElementById('resume-preview');
            // The Creative template removes the outer padding so its colored sidebar can touch the edges
            const paddingClass = temp === 'creative' ? 'p-0' : 'p-10 md:p-16';
            preview.className = `bg-white shadow-md w-full min-h-[29.7cm] ${paddingClass} text-gray-800 text-sm leading-relaxed tpl-${temp}`;
            
            renderPreview();
        }

        let currentZoom = 0.85;

        function setZoom(scale) {
            currentZoom = parseFloat(scale);
            const wrapper = document.getElementById('preview-wrapper');
            if (wrapper) wrapper.style.transform = `scale(${currentZoom})`;
            
            const slider = document.getElementById('zoom-slider');
            if (slider && slider.value != currentZoom) slider.value = currentZoom;
            
            const text = document.getElementById('zoom-level-text');
            if (text) text.innerText = `${Math.round(currentZoom * 100)}%`;
        }

        function adjustZoom(delta) {
            let newZoom = currentZoom + delta;
            newZoom = Math.max(0.3, Math.min(1.5, newZoom)); 
            setZoom(newZoom);
        }

        function updateThemeColor(color) {
            state.themeColor = color;
            document.documentElement.style.setProperty('--theme-color', color);
            
            const colorInput = document.getElementById('inp-color');
            if (colorInput && colorInput.value !== color) {
                colorInput.value = color;
            }
            renderPreview();
        }

        // --- Photo Handling ---
        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    state.photo = e.target.result;
                    document.getElementById('btn-remove-photo').classList.remove('hidden');
                    renderPreview();
                }
                reader.readAsDataURL(file);
            }
        }

        function removePhoto() {
            state.photo = '';
            document.getElementById('inp-photo').value = '';
            document.getElementById('btn-remove-photo').classList.add('hidden');
            renderPreview();
        }

        // --- PDF & Word Export ---
        function downloadWord() {
            let styleRules = `
                body { font-family: 'Arial', sans-serif; line-height: 1.5; color: #333; }
                h1, h2, h3 { color: #111; }
                .text-theme { color: ${state.themeColor}; }
            `;
            
            if (state.template === 'classic') {
                styleRules += `.section-title { color: ${state.themeColor}; border-bottom: 1px solid ${state.themeColor}; padding-bottom: 8px; margin-bottom: 16px; text-transform: uppercase; font-size: 14px; font-weight: bold; text-align: left; } h1 { text-align: center; }`;
            } else if (state.template === 'modern') {
                styleRules += `.section-title { color: #111; border-left: 4px solid ${state.themeColor}; padding-left: 10px; margin-bottom: 16px; text-transform: uppercase; font-size: 15px; font-weight: bold; text-align: left; } h1 { text-align: left; }`;
            } else if (state.template === 'creative') {
                styleRules += `.section-title { color: ${state.themeColor}; border-bottom: 2px solid ${state.themeColor}; padding-bottom: 6px; margin-bottom: 16px; text-transform: uppercase; font-size: 14.5px; font-weight: bold; text-align: left; } h1 { text-align: left; }`;
            } else {
                styleRules += `.section-title { color: ${state.themeColor}; margin-bottom: 12px; text-transform: uppercase; font-size: 13px; font-weight: bold; text-align: left; letter-spacing: 1px; border-bottom: 1px solid #eee; padding-bottom: 4px; } h1 { text-align: left; }`;
            }

            const preHtml = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'><head><meta charset='utf-8'><title>Resume Export</title><style>${styleRules}</style></head><body>`;
            const postHtml = "</body></html>";
            
            const content = document.getElementById('resume-preview').innerHTML;
            const html = preHtml + content + postHtml;
            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            const fileName = state.firstName ? `${state.firstName}_Resume.doc` : 'Resume.doc';
            link.download = fileName;
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function downloadPDF() {
            const element = document.getElementById('resume-preview');
            const btn = document.getElementById('pdf-btn');
            const originalText = btn.innerHTML;
            
            element.classList.remove('shadow-md');
            btn.innerHTML = '<svg class="animate-spin w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span class="hidden sm:inline">Saving...</span>';

            const fileName = state.firstName ? `${state.firstName}_Resume.pdf` : 'Resume.pdf';
            
            const opt = {
                margin:       0,
                filename:     fileName,
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 2, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.classList.add('shadow-md');
                btn.innerHTML = originalText;
            });
        }

        function downloadPNG() {
            const element = document.getElementById('resume-preview');
            const btn = document.getElementById('png-btn');
            const originalText = btn.innerHTML;
            
            // Temporarily remove shadow for clean PNG
            element.classList.remove('shadow-md');
            // Show loading state
            btn.innerHTML = '<svg class="animate-spin w-4 h-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> <span class="hidden sm:inline">Saving...</span>';

            html2canvas(element, { scale: 2, useCORS: true }).then(canvas => {
                const imgData = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                const fileName = state.firstName ? `${state.firstName}_Resume.png` : 'Resume.png';
                link.download = fileName;
                link.href = imgData;
                link.click();
                
                // Restore shadow and original button text
                element.classList.add('shadow-md');
                btn.innerHTML = originalText;
            });
        }

        // --- Core Data Functions ---
        function updateState(key, value) {
            state[key] = value;
            renderPreview();
        }

        function updateExp(index, key, value) { state.experiences[index][key] = value; renderPreview(); }
        function addExp() { state.experiences.push({ title: '', company: '', date: '', description: '' }); renderExpEditor(); renderPreview(); }
        function removeExp(index) { state.experiences.splice(index, 1); renderExpEditor(); renderPreview(); }

        function updateEdu(index, key, value) { state.educations[index][key] = value; renderPreview(); }
        function addEdu() { state.educations.push({ degree: '', school: '', date: '' }); renderEduEditor(); renderPreview(); }
        function removeEdu(index) { state.educations.splice(index, 1); renderEduEditor(); renderPreview(); }

        function updateAdditional(index, key, value) { state.additionals[index][key] = value; renderPreview(); }
        function addAdditional() { state.additionals.push({ category: '', details: '' }); renderAdditionalEditor(); renderPreview(); }
        function removeAdditional(index) { state.additionals.splice(index, 1); renderAdditionalEditor(); renderPreview(); }

        function updateProject(index, key, value) { state.projects[index][key] = value; renderPreview(); }
        function addProject() { state.projects.push({ title: '', link: '', description: '' }); renderProjectEditor(); renderPreview(); }
        function removeProject(index) { state.projects.splice(index, 1); renderProjectEditor(); renderPreview(); }

        function updateAchievement(index, key, value) { state.achievements[index][key] = value; renderPreview(); }
        function addAchievement() { state.achievements.push({ title: '', date: '', description: '' }); renderAchievementEditor(); renderPreview(); }
        function removeAchievement(index) { state.achievements.splice(index, 1); renderAchievementEditor(); renderPreview(); }

        // --- Editor Rendering ---
        function initEditor() {
            document.getElementById('inp-color').value = state.themeColor;
            updateThemeColor(state.themeColor);

            if (state.photo) {
                document.getElementById('btn-remove-photo').classList.remove('hidden');
            }

            ['firstname', 'lastname', 'title', 'email', 'phone', 'location', 'linkedin', 'website', 'github', 'dob', 'nationality', 'summary', 'skills'].forEach(id => {
                const mapKey = id === 'firstname' ? 'firstName' : id === 'lastname' ? 'lastName' : id;
                const el = document.getElementById(`inp-${id}`);
                if(el) el.value = state[mapKey];
            });
            
            renderExpEditor();
            renderEduEditor();
            renderProjectEditor();
            renderAchievementEditor();
            renderAdditionalEditor();
        }

        function renderExpEditor() {
            const container = document.getElementById('experience-editor-container');
            container.innerHTML = state.experiences.map((exp, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeExp(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Job Title" oninput="updateExp(${index}, 'title', this.value)" value="${exp.title}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="Company Name" oninput="updateExp(${index}, 'company', this.value)" value="${exp.company}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="Dates (e.g. Jan 2020 - Present)" oninput="updateExp(${index}, 'date', this.value)" value="${exp.date}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <textarea placeholder="Job Description (Line breaks become bullet points)" oninput="updateExp(${index}, 'description', this.value)" rows="3" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none resize-none">${exp.description || ''}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function renderEduEditor() {
            const container = document.getElementById('education-editor-container');
            container.innerHTML = state.educations.map((edu, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeEdu(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Degree / Certificate" oninput="updateEdu(${index}, 'degree', this.value)" value="${edu.degree}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="School / University" oninput="updateEdu(${index}, 'school', this.value)" value="${edu.school}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="Year / Dates" oninput="updateEdu(${index}, 'date', this.value)" value="${edu.date}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                    </div>
                </div>
            `).join('');
        }

        function renderProjectEditor() {
            const container = document.getElementById('projects-editor-container');
            container.innerHTML = state.projects.map((proj, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeProject(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Project Title" oninput="updateProject(${index}, 'title', this.value)" value="${proj.title}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="Project Link / URL" oninput="updateProject(${index}, 'link', this.value)" value="${proj.link}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <textarea placeholder="Description (Line breaks become bullet points)" oninput="updateProject(${index}, 'description', this.value)" rows="3" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none resize-none">${proj.description}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function renderAchievementEditor() {
            const container = document.getElementById('achievements-editor-container');
            container.innerHTML = state.achievements.map((ach, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeAchievement(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Achievement / Award Title" oninput="updateAchievement(${index}, 'title', this.value)" value="${ach.title}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <input type="text" placeholder="Date / Year" oninput="updateAchievement(${index}, 'date', this.value)" value="${ach.date}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <textarea placeholder="Description / Details" oninput="updateAchievement(${index}, 'description', this.value)" rows="2" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none resize-none">${ach.description}</textarea>
                    </div>
                </div>
            `).join('');
        }

        function renderAdditionalEditor() {
            const container = document.getElementById('additional-editor-container');
            container.innerHTML = state.additionals.map((add, index) => `
                <div class="bg-gray-50 p-4 rounded-lg border border-gray-200 relative group transition-all">
                    <button onclick="removeAdditional(${index})" class="absolute top-2 right-2 text-red-500 hover:bg-red-100 p-1 rounded opacity-0 group-hover:opacity-100 transition-opacity" title="Remove">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                    </button>
                    <div class="grid grid-cols-1 gap-3">
                        <input type="text" placeholder="Category (e.g., Languages, Certifications)" oninput="updateAdditional(${index}, 'category', this.value)" value="${add.category}" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none">
                        <textarea placeholder="Details (Line breaks become bullet points)" oninput="updateAdditional(${index}, 'details', this.value)" rows="2" class="w-full p-2 text-sm border border-gray-300 rounded focus:ring-1 focus:ring-[var(--theme-color)] focus:border-[var(--theme-color)] outline-none resize-none">${add.details}</textarea>
                    </div>
                </div>
            `).join('');
        }

        // --- Resume Template Generation ---
        function renderPreview() {
            const preview = document.getElementById('resume-preview');
            const fullName = [state.firstName, state.lastName].filter(Boolean).join(' ');

            // SVG Icons Map
            const icons = {
                email: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>`,
                phone: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>`,
                location: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>`,
                linkedin: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>`,
                website: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>`,
                github: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"></path></svg>`,
                dob: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>`,
                nationality: `<svg class="w-3.5 h-3.5 mt-0.5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.055 11H5a2 2 0 012 2v1a2 2 0 002 2 2 2 0 012 2v2.945M8 3.935V5.5A2.5 2.5 0 0010.5 8h.5a2 2 0 012 2 2 2 0 104 0 2 2 0 012-2h1.064M15 20.488V18a2 2 0 012-2h3.064M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`
            };

            // Formatting Helper Functions
            const makeBullets = (text) => text ? `<ul class="text-[13px] leading-relaxed list-disc ml-4 mt-1">` + text.split('\n').filter(line => line.trim() !== '').map(line => `<li>${line}</li>`).join('') + `</ul>` : '';
            const makeLink = (url) => url ? `<a href="${url.startsWith('http') ? url : 'https://' + url}" target="_blank" class="text-blue-600 hover:underline text-xs ml-2">${url}</a>` : '';
            
            // Build Blocks
            const blockExp = state.experiences.filter(exp => exp.title || exp.company).map(exp => `
                <div class="mb-4">
                    <div class="flex justify-between items-baseline mb-1">
                        <h3 class="font-bold text-gray-800 text-[14px] md:text-[15px]">${exp.title}</h3>
                        <span class="text-gray-600 font-medium text-xs whitespace-nowrap ml-2">${exp.date}</span>
                    </div>
                    <div class="text-gray-700 italic mb-1.5 text-sm">${exp.company}</div>
                    ${makeBullets(exp.description)}
                </div>
            `).join('');

            const blockEdu = state.educations.filter(edu => edu.degree || edu.school).map(edu => `
                <div class="mb-3">
                    <div class="flex justify-between items-baseline mb-1">
                        <h3 class="font-bold text-gray-800 text-[14px] md:text-[15px]">${edu.degree}</h3>
                        <span class="text-gray-600 font-medium text-xs whitespace-nowrap ml-2">${edu.date}</span>
                    </div>
                    <div class="text-gray-700 text-sm">${edu.school}</div>
                </div>
            `).join('');

            const blockProj = state.projects.filter(proj => proj.title).map(proj => `
                <div class="mb-4">
                    <div class="flex items-baseline mb-1">
                        <h3 class="font-bold text-gray-800 text-[14px] md:text-[15px]">${proj.title}</h3>
                        ${makeLink(proj.link)}
                    </div>
                    ${makeBullets(proj.description)}
                </div>
            `).join('');

            const blockAch = state.achievements.filter(ach => ach.title).map(ach => `
                <div class="mb-4">
                    <div class="flex justify-between items-baseline mb-1">
                        <h3 class="font-bold text-gray-800 text-[14px] md:text-[15px]">${ach.title}</h3>
                        <span class="text-gray-600 font-medium text-xs whitespace-nowrap ml-2">${ach.date}</span>
                    </div>
                    ${ach.description ? `<p class="text-[13px] text-gray-700 leading-relaxed">${ach.description}</p>` : ''}
                </div>
            `).join('');

            const skillsArr = state.skills.split(',').filter(s => s.trim() !== '');
            const blockSkillsTags = skillsArr.length > 0 ? `<div class="flex flex-wrap gap-2 mt-2">` + skillsArr.map(s => `<span class="bg-gray-100 text-gray-800 border border-gray-200 px-2 py-1 rounded text-[11px] font-medium">${s.trim()}</span>`).join('') + `</div>` : '';
            const blockSkillsText = skillsArr.length > 0 ? `<div class="text-[13px] text-gray-800 leading-relaxed">${state.skills}</div>` : '';

            const blockAddt = state.additionals.filter(add => add.category || add.details).map(add => `
                <div class="mb-3">
                    <h3 class="font-bold text-gray-800 text-[14px] md:text-[15px] mb-1">${add.category}</h3>
                    ${add.details.includes('\n') ? makeBullets(add.details) : `<div class="text-[13px] text-gray-700">${add.details}</div>`}
                </div>
            `).join('');

            const contactArray = [
                { val: state.email, icon: icons.email }, { val: state.phone, icon: icons.phone }, 
                { val: state.location, icon: icons.location }, { val: state.linkedin, icon: icons.linkedin }, 
                { val: state.website, icon: icons.website }, { val: state.github, icon: icons.github }, 
                { val: state.dob, icon: icons.dob }, { val: state.nationality, icon: icons.nationality }
            ].filter(item => item.val);

            // Generate HTML based on Template Selection
            let finalHtml = '';

            if (state.template === 'classic') {
                const contactRow = contactArray.map(item => `<span class="flex items-start gap-1.5">${item.icon}<span>${item.val}</span></span>`).join('');
                
                finalHtml = `
                    <div class="text-center mb-8">
                        ${state.photo ? `<div class="mx-auto w-28 h-28 mb-5 rounded-full overflow-hidden border border-gray-200 shadow-sm"><img src="${state.photo}" class="w-full h-full object-cover"></div>` : ''}
                        <h1 class="text-[2.5rem] md:text-[3.25rem] leading-[1.1] text-black font-serif-name tracking-tight mb-2 font-bold">${fullName || 'Your Name'}</h1>
                        <div style="color: ${state.themeColor};" class="text-sm uppercase tracking-widest font-semibold mb-4">${state.title || 'Professional Title'}</div>
                        <div class="flex flex-wrap justify-center gap-x-5 gap-y-2 text-[12.5px] text-gray-600 mb-6">
                            ${contactRow}
                        </div>
                    </div>
                    ${state.summary ? `<div class="mb-6"><p class="text-[13px] text-gray-700 leading-relaxed text-justify">${state.summary}</p></div>` : ''}
                    ${blockExp ? `<div class="mb-7"><h2 class="section-title">Experience</h2>${blockExp}</div>` : ''}
                    ${blockEdu ? `<div class="mb-7"><h2 class="section-title">Education</h2>${blockEdu}</div>` : ''}
                    ${blockProj ? `<div class="mb-7"><h2 class="section-title">Projects</h2>${blockProj}</div>` : ''}
                    ${blockAch ? `<div class="mb-7"><h2 class="section-title">Achievements</h2>${blockAch}</div>` : ''}
                    ${blockSkillsTags ? `<div class="mb-7"><h2 class="section-title">Skills</h2>${blockSkillsTags}</div>` : ''}
                    ${blockAddt ? `<div class="mb-7"><h2 class="section-title">Additional Information</h2>${blockAddt}</div>` : ''}
                `;

            } else if (state.template === 'modern') {
                const contactCol = contactArray.map(item => `<div class="flex items-start gap-2 mb-2 text-gray-600">${item.icon}<span class="break-all">${item.val}</span></div>`).join('');

                finalHtml = `
                    <div class="mb-8 flex justify-between items-center gap-6">
                        <div>
                            <h1 class="text-4xl md:text-5xl font-extrabold text-gray-900 tracking-tight mb-2">${fullName || 'Your Name'}</h1>
                            <div style="color: ${state.themeColor};" class="text-lg font-bold">${state.title || 'Professional Title'}</div>
                        </div>
                        ${state.photo ? `<div class="w-24 h-24 rounded-lg shadow-md overflow-hidden shrink-0"><img src="${state.photo}" class="w-full h-full object-cover"></div>` : ''}
                    </div>
                    <div class="flex flex-col md:flex-row gap-8">
                        <!-- Left Column -->
                        <div class="w-full md:w-1/3 flex flex-col gap-8">
                            ${contactCol ? `<div><h2 class="section-title">Contact</h2><div class="text-[12.5px]">${contactCol}</div></div>` : ''}
                            ${blockSkillsText ? `<div><h2 class="section-title">Skills</h2>${blockSkillsText}</div>` : ''}
                            ${blockEdu ? `<div><h2 class="section-title">Education</h2>${blockEdu}</div>` : ''}
                        </div>
                        <!-- Right Column -->
                        <div class="w-full md:w-2/3 flex flex-col gap-6">
                            ${state.summary ? `<div><h2 class="section-title">Summary</h2><p class="text-[13px] text-gray-700 leading-relaxed text-justify">${state.summary}</p></div>` : ''}
                            ${blockExp ? `<div><h2 class="section-title">Experience</h2>${blockExp}</div>` : ''}
                            ${blockProj ? `<div><h2 class="section-title">Projects</h2>${blockProj}</div>` : ''}
                            ${blockAch ? `<div><h2 class="section-title">Achievements</h2>${blockAch}</div>` : ''}
                            ${blockAddt ? `<div><h2 class="section-title">Additional Info</h2>${blockAddt}</div>` : ''}
                        </div>
                    </div>
                `;

            } else if (state.template === 'minimal') {
                const contactRow = contactArray.map(item => `<span class="flex items-center gap-1"><span style="color: ${state.themeColor}">${item.icon}</span><span>${item.val}</span></span>`).join('<span class="text-gray-300 mx-2">|</span>');
                
                finalHtml = `
                    <div class="mb-6 border-b-2 pb-4 flex justify-between items-end gap-4" style="border-color: ${state.themeColor};">
                        <div>
                            <h1 class="text-3xl font-bold text-gray-900 uppercase tracking-widest mb-1">${fullName || 'Your Name'}</h1>
                            <div class="text-[15px] text-gray-600 font-medium mb-3">${state.title || 'Professional Title'}</div>
                            <div class="flex flex-wrap items-center text-[11.5px] text-gray-600">
                                ${contactRow}
                            </div>
                        </div>
                        ${state.photo ? `<div class="w-16 h-16 rounded-full overflow-hidden shrink-0 border-2 border-white shadow-sm ring-1 ring-gray-200"><img src="${state.photo}" class="w-full h-full object-cover"></div>` : ''}
                    </div>
                    <div class="space-y-5">
                        ${state.summary ? `<div><p class="text-[12.5px] text-gray-700 leading-relaxed">${state.summary}</p></div>` : ''}
                        ${blockExp ? `<div><h2 class="section-title">Experience</h2>${blockExp}</div>` : ''}
                        ${blockEdu ? `<div><h2 class="section-title">Education</h2>${blockEdu}</div>` : ''}
                        ${blockProj ? `<div><h2 class="section-title">Projects</h2>${blockProj}</div>` : ''}
                        ${blockAch ? `<div><h2 class="section-title">Achievements</h2>${blockAch}</div>` : ''}
                        ${blockSkillsTags ? `<div><h2 class="section-title">Skills</h2>${blockSkillsText}</div>` : ''}
                        ${blockAddt ? `<div><h2 class="section-title">Additional Info</h2>${blockAddt}</div>` : ''}
                    </div>
                `;
            } else if (state.template === 'creative') {
                const contactCol = contactArray.map(item => `<div class="flex items-start gap-2 mb-3 text-white/90"><span style="color: white;">${item.icon}</span><span class="break-all text-[12.5px]">${item.val}</span></div>`).join('');
                
                finalHtml = `
                    <div class="flex h-full min-h-[29.7cm]">
                        <!-- Sidebar -->
                        <div class="w-1/3 p-8 md:p-10 text-white flex flex-col gap-8 shrink-0" style="background-color: ${state.themeColor};">
                            ${state.photo ? `<div class="w-32 h-32 mx-auto rounded-full overflow-hidden border-4 border-white/20 shadow-lg"><img src="${state.photo}" class="w-full h-full object-cover"></div>` : ''}
                            
                            ${contactCol ? `<div><h2 class="text-[13px] font-bold uppercase tracking-widest border-b border-white/30 pb-2 mb-4">Contact</h2>${contactCol}</div>` : ''}
                            
                            ${blockSkillsText ? `<div><h2 class="text-[13px] font-bold uppercase tracking-widest border-b border-white/30 pb-2 mb-4">Skills</h2><div class="text-[12.5px] text-white/90 leading-relaxed">${state.skills}</div></div>` : ''}
                            
                            ${blockEdu ? `<div><h2 class="text-[13px] font-bold uppercase tracking-widest border-b border-white/30 pb-2 mb-4">Education</h2><div class="text-white/90">${blockEdu.replace(/text-gray-800/g, 'text-white').replace(/text-gray-600/g, 'text-white/70').replace(/text-gray-700/g, 'text-white/80')}</div></div>` : ''}
                        </div>
                        
                        <!-- Main Content -->
                        <div class="w-2/3 p-8 md:p-10 bg-white">
                            <div class="mb-8">
                                <h1 class="text-4xl md:text-5xl font-black text-gray-900 tracking-tight mb-2 uppercase">${fullName || 'Your Name'}</h1>
                                <div style="color: ${state.themeColor};" class="text-lg font-bold tracking-widest uppercase">${state.title || 'Professional Title'}</div>
                            </div>
                            
                            <div class="flex flex-col gap-6">
                                ${state.summary ? `<div><h2 class="section-title">Profile</h2><p class="text-[13px] text-gray-700 leading-relaxed text-justify">${state.summary}</p></div>` : ''}
                                ${blockExp ? `<div><h2 class="section-title">Experience</h2>${blockExp}</div>` : ''}
                                ${blockProj ? `<div><h2 class="section-title">Projects</h2>${blockProj}</div>` : ''}
                                ${blockAch ? `<div><h2 class="section-title">Achievements</h2>${blockAch}</div>` : ''}
                                ${blockAddt ? `<div><h2 class="section-title">Additional Info</h2>${blockAddt}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }

            preview.innerHTML = finalHtml || '<p class="text-gray-400 text-center italic mt-20">Start typing in the editor to see your preview...</p>';
        }

        // Auto-scale preview for mobile screens
        function autoScalePreview() {
            const previewPanel = document.getElementById('preview-panel');
            const wrapper = document.getElementById('preview-wrapper');
            if (!previewPanel || !wrapper) return;
            
            // Check if preview is currently visible
            if (previewPanel.classList.contains('hidden')) return;

            const panelWidth = previewPanel.clientWidth;
            const docWidth = 794; // A4 max width + padding offset
            
            if (window.innerWidth < 768) {
                // On mobile, force it to perfectly fit the screen bounds
                const scale = Math.max(0.3, (panelWidth - 32) / docWidth); // 32px padding
                setZoom(scale);
            } else if (panelWidth < docWidth + 40) {
                const scale = (panelWidth - 40) / docWidth;
                setZoom(scale);
            } else if (currentZoom < 0.5) { 
                // Reset if we expand back to desktop
                setZoom(0.85);
            }
        }

        // Initialize Application
        window.addEventListener('DOMContentLoaded', () => {
            initEditor();
            renderPreview();
            
            // Setup initial layout
            if (window.innerWidth < 768) {
                toggleMobileView('editor');
            } else {
                autoScalePreview();
            }
        });

        // Handle window resizes
        window.addEventListener('resize', () => {
            // Unhide preview panel on desktop automatically
            if (window.innerWidth >= 768) {
                document.getElementById('editor-panel').classList.remove('hidden');
                document.getElementById('preview-panel').classList.remove('hidden');
            }
            autoScalePreview();
        });

    </script>
</body>
