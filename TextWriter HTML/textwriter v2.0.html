<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="x-ua-compatible" content="ie=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#09090b" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Primary Title & Description (SEO) -->
    <title>TextWriter ❮/❯ HTML — Modern Online Text to HTML Converter</title>
    <meta name="description" content="A fast, minimalist online HTML text writer & converter. Live preview, download .html, export PDF, copy & share snippets." />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS with Typography Plugin -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f5f3ff', 100: '#ede9fe', 200: '#ddd6fe', 300: '#c4b5fd', 400: '#a78bfa', 
                            500: '#8b5cf6', 600: '#7c3aed', 700: '#6d28d9', 800: '#5b21b6', 900: '#4c1d95',
                        }
                    },
                    typography: (theme) => ({
                        DEFAULT: {
                            css: {
                                '--tw-prose-body': theme('colors.zinc.700'),
                                '--tw-prose-headings': theme('colors.zinc.900'),
                                '--tw-prose-links': theme('colors.brand.600'),
                                '--tw-prose-bold': theme('colors.zinc.900'),
                                '--tw-prose-bullets': theme('colors.zinc.400'),
                                '--tw-prose-quotes': theme('colors.zinc.900'),
                                '--tw-prose-quote-borders': theme('colors.brand.500'),
                            },
                        },
                        invert: {
                            css: {
                                '--tw-prose-body': theme('colors.zinc.300'),
                                '--tw-prose-headings': theme('colors.white'),
                                '--tw-prose-links': theme('colors.brand.400'),
                                '--tw-prose-bold': theme('colors.white'),
                                '--tw-prose-bullets': theme('colors.zinc.600'),
                                '--tw-prose-quotes': theme('colors.zinc.100'),
                                '--tw-prose-quote-borders': theme('colors.brand.500'),
                            },
                        },
                    }),
                }
            }
        }
    </script>

    <!-- html2pdf & Lucide Icons (pinned version + fallback CDN, since @latest can 404/break) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://unpkg.com/lucide@0.561.0/dist/umd/lucide.min.js" onerror="this.onerror=null;var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/lucide@0.561.0/dist/umd/lucide.min.js';document.head.appendChild(s);"></script>

    <!-- PDF.js (PDF text extraction) & Mammoth.js (Word .docx to HTML) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>

    <style>
        /* Custom scrollbars */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 10px; }
        .dark ::-webkit-scrollbar-thumb { background: #3f3f46; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #52525b; }

        /* Smooth selections */
        ::selection { background: #c4b5fd; color: #18181b; }
        .dark ::selection { background: #7c3aed; color: #ffffff; }

        /* Editor base styling & removal of default outline */
        #text-editor { outline: none; min-height: 100%; }
        
        /* Glassmorphism utilities */
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
        .dark .glass { background: rgba(24, 24, 27, 0.8); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

        /* Syntax Highlighting */
        .syntax-tag { color: #3b82f6; }
        .syntax-attr { color: #d97706; }
        .syntax-val { color: #10b981; }
        .dark .syntax-tag { color: #60a5fa; }
        .dark .syntax-attr { color: #fbbf24; }
        .dark .syntax-val { color: #34d399; }

        /* UI Transitions */
        .hidden-tab { display: none !important; }
        .toolbar-group { @apply flex items-center bg-zinc-100 dark:bg-zinc-800/50 p-1 rounded-lg border border-zinc-200 dark:border-zinc-700/50; }

        /* Empty Editor Placeholder */
        [contenteditable]:empty::before {
            content: attr(data-placeholder);
            color: #a1a1aa;
            pointer-events: none;
            display: block;
        }

        /* Mobile panel switcher: only hides below the lg breakpoint (1024px).
           At lg+ the editor and output panels are always shown side-by-side. */
        @media (max-width: 1023.98px) {
            .mobile-hide { display: none !important; }
        }

        /* Respect device safe areas (notches / home indicators) on mobile */
        .safe-top { padding-top: max(env(safe-area-inset-top), 0px); }
        .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
        .safe-x { padding-left: max(env(safe-area-inset-left), 0px); padding-right: max(env(safe-area-inset-right), 0px); }

        /* Slightly larger, easier-to-hit tap targets on touch devices */
        @media (hover: none) and (pointer: coarse) {
            .toolbar-btn, #upload-trigger-btn, .tab-btn, #theme-toggle { min-height: 40px; min-width: 40px; }
        }

        /* Drag & drop overlay: shown by adding .is-active (avoids hidden/flex class conflicts) */
        #drop-overlay.is-active { display: flex !important; }
        #editor-dropzone.drag-active #text-editor { pointer-events: none; }
    </style>
</head>
<body class="bg-zinc-50 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 h-screen flex flex-col transition-colors duration-300 overflow-hidden font-sans selection:bg-brand-500/30 safe-x">
    
    <!-- Background Accents -->
    <div class="absolute top-0 inset-x-0 h-40 bg-gradient-to-b from-brand-500/10 to-transparent pointer-events-none -z-10"></div>
    <div class="absolute bottom-0 inset-x-0 h-40 bg-gradient-to-t from-brand-500/5 to-transparent pointer-events-none -z-10"></div>

    <!-- Header -->
    <header class="flex-none glass border-b border-zinc-200/80 dark:border-zinc-800/80 px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center z-20 safe-top">
        <div class="flex items-center gap-2 sm:gap-3 min-w-0">
            <div class="p-1.5 sm:p-2 bg-gradient-to-br from-brand-500 to-brand-600 rounded-xl text-white shadow-lg shadow-brand-500/20 flex-shrink-0">
                <i data-lucide="code-2" class="w-4 h-4 sm:w-5 sm:h-5"></i>
            </div>
            <h1 class="font-bold text-base sm:text-xl tracking-tight text-zinc-800 dark:text-white truncate">TextWriter <span class="text-brand-500 font-medium hidden sm:inline">HTML</span></h1>
        </div>
        <div class="flex items-center gap-2 sm:gap-4 flex-shrink-0">
            <a href="https://github.com" target="_blank" rel="noopener" aria-label="View on GitHub" class="hidden sm:inline-flex text-zinc-400 hover:text-zinc-600 dark:hover:text-zinc-300 transition-colors">
                <i data-lucide="github" class="w-5 h-5"></i>
            </a>
            <div class="w-px h-6 bg-zinc-200 dark:bg-zinc-800 hidden sm:block"></div>
            <button id="theme-toggle" class="p-2 rounded-xl bg-zinc-100 dark:bg-zinc-800/50 border border-zinc-200 dark:border-zinc-700/50 hover:bg-zinc-200 dark:hover:bg-zinc-700 transition-colors group" aria-label="Toggle theme">
                <i data-lucide="moon" id="moon-icon" class="hidden dark:block w-4 h-4 text-zinc-400 group-hover:text-brand-400 transition-colors"></i>
                <i data-lucide="sun" id="sun-icon" class="block dark:hidden w-4 h-4 text-zinc-500 group-hover:text-brand-500 transition-colors"></i>
            </button>
        </div>
    </header>

    <!-- Mobile Panel Switcher (Write / Preview) — only shown below the lg breakpoint -->
    <div class="lg:hidden flex-none glass border-b border-zinc-200/80 dark:border-zinc-800/80 px-4 py-2 z-20">
        <div class="flex p-1 gap-1 bg-zinc-100 dark:bg-zinc-800/80 rounded-lg border border-zinc-200/50 dark:border-zinc-700/50">
            <button id="mobile-editor-btn" class="mobile-panel-btn flex-1 flex items-center justify-center gap-2 px-3 py-2 text-sm font-medium rounded-md bg-white dark:bg-zinc-700 text-zinc-900 dark:text-white shadow-sm transition-all" data-panel="editor" aria-pressed="true">
                <i data-lucide="pencil-line" class="w-4 h-4"></i> Write
            </button>
            <button id="mobile-output-btn" class="mobile-panel-btn flex-1 flex items-center justify-center gap-2 px-3 py-2 text-sm font-medium rounded-md text-zinc-500 dark:text-zinc-400 transition-all" data-panel="output" aria-pressed="false">
                <i data-lucide="eye" class="w-4 h-4"></i> Preview
            </button>
        </div>
    </div>

    <!-- Main Workspace -->
    <main class="flex-grow flex flex-col lg:flex-row gap-3 sm:gap-6 p-3 sm:p-4 lg:p-6 overflow-hidden min-h-0 z-10 max-w-[1920px] mx-auto w-full safe-bottom">
        
        <!-- Editor Panel -->
        <section id="editor-panel" class="flex-1 flex flex-col bg-white/60 dark:bg-zinc-900/40 backdrop-blur-md rounded-2xl border border-zinc-200/80 dark:border-zinc-800/80 shadow-sm overflow-hidden flex-shrink-0 min-h-0">
            <!-- Floating Toolbar -->
            <div class="flex-none px-2 sm:px-4 py-2 sm:py-3 border-b border-zinc-200/80 dark:border-zinc-800/80 flex flex-nowrap items-center gap-2 sm:gap-3 overflow-x-auto">
                
                <!-- Text Styles -->
                <div class="toolbar-group">
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="bold" title="Bold"><i data-lucide="bold" class="w-4 h-4"></i></button>
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="italic" title="Italic"><i data-lucide="italic" class="w-4 h-4"></i></button>
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="underline" title="Underline"><i data-lucide="underline" class="w-4 h-4"></i></button>
                </div>

                <!-- Headings -->
                <div class="toolbar-group">
                    <button class="toolbar-btn px-2.5 py-2 sm:py-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all font-bold font-sans text-xs" data-command="formatBlock" data-value="h1" title="Heading 1">H1</button>
                    <button class="toolbar-btn px-2.5 py-2 sm:py-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all font-bold font-sans text-xs" data-command="formatBlock" data-value="h2" title="Heading 2">H2</button>
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="formatBlock" data-value="p" title="Paragraph"><i data-lucide="type" class="w-4 h-4"></i></button>
                </div>

                <!-- Lists & Links -->
                <div class="toolbar-group">
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="insertUnorderedList" title="Bullet List"><i data-lucide="list" class="w-4 h-4"></i></button>
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="insertOrderedList" title="Numbered List"><i data-lucide="list-ordered" class="w-4 h-4"></i></button>
                    <div class="w-px h-4 bg-zinc-300 dark:bg-zinc-600 mx-1"></div>
                    <button class="toolbar-btn p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" data-command="createLink" title="Add Link"><i data-lucide="link-2" class="w-4 h-4"></i></button>
                </div>

                <!-- File Upload -->
                <div class="toolbar-group">
                    <button id="upload-trigger-btn" class="p-2 sm:p-1.5 rounded-md hover:bg-white dark:hover:bg-zinc-700 hover:shadow-sm text-zinc-500 hover:text-zinc-900 dark:hover:text-white transition-all" title="Upload Text/HTML/PDF/Word File">
                        <i data-lucide="upload" class="w-4 h-4"></i>
                    </button>
                    <input type="file" id="file-upload" class="hidden" accept=".txt,.html,.htm,.md,.csv,.json,.pdf,.doc,.docx" />
                </div>
            </div>
            
            <!-- Editor Area (drop zone for drag & drop file import) -->
            <div id="editor-dropzone" class="relative flex-grow overflow-y-auto bg-zinc-50/50 dark:bg-[#0a0a0c]/50 p-2 sm:p-4 lg:p-8">
                <!-- Inner Document Page Look -->
                <div class="bg-white dark:bg-zinc-900 shadow-sm border border-zinc-100 dark:border-zinc-800/60 rounded-xl min-h-full mx-auto max-w-3xl p-5 sm:p-8 lg:p-12 transition-all">
                    <div id="text-editor" contenteditable="true" spellcheck="false" class="prose prose-sm sm:prose-base prose-zinc dark:prose-invert prose-brand max-w-none focus:outline-none placeholder-zinc-400" data-placeholder="Start writing your masterpiece here..."></div>
                </div>

                <!-- Drag & Drop Overlay -->
                <div id="drop-overlay" class="hidden absolute inset-0 z-30 m-2 sm:m-3 rounded-xl border-2 border-dashed border-brand-500 bg-brand-500/10 dark:bg-brand-500/15 backdrop-blur-sm flex-col items-center justify-center gap-3 pointer-events-none">
                    <div class="p-3 bg-brand-500 rounded-2xl text-white shadow-lg shadow-brand-500/30">
                        <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                    </div>
                    <p class="font-semibold text-brand-700 dark:text-brand-300 text-sm sm:text-base">Drop file to import</p>
                    <p class="text-xs text-brand-600/80 dark:text-brand-400/80">.txt .html .md .csv .json .pdf .docx</p>
                </div>
            </div>
        </section>

        <!-- Output Panel -->
        <section id="output-panel" class="mobile-hide flex-1 flex flex-col bg-white/60 dark:bg-zinc-900/40 backdrop-blur-md rounded-2xl border border-zinc-200/80 dark:border-zinc-800/80 shadow-sm overflow-hidden flex-shrink-0 min-h-0">
            <!-- Output Header & Tabs -->
            <div class="flex-none px-3 sm:px-4 py-2 sm:py-3 border-b border-zinc-200/80 dark:border-zinc-800/80 flex flex-wrap items-center gap-2 sm:justify-between bg-white/40 dark:bg-zinc-900/40">
                
                <div class="flex p-1 space-x-1 bg-zinc-100 dark:bg-zinc-800/80 rounded-lg border border-zinc-200/50 dark:border-zinc-700/50">
                    <button class="tab-btn active px-3 sm:px-4 py-1.5 text-sm font-medium rounded-md bg-white dark:bg-zinc-700 text-zinc-900 dark:text-white shadow-sm flex items-center gap-2 transition-all" data-tab="preview">
                        <i data-lucide="layout" class="w-4 h-4"></i> <span class="hidden sm:inline">Preview</span>
                    </button>
                    <button class="tab-btn px-3 sm:px-4 py-1.5 text-sm font-medium rounded-md text-zinc-500 dark:text-zinc-400 hover:text-zinc-700 dark:hover:text-zinc-200 hover:bg-zinc-200/50 dark:hover:bg-zinc-700/50 flex items-center gap-2 transition-all" data-tab="code">
                        <i data-lucide="file-code-2" class="w-4 h-4"></i> <span class="hidden sm:inline">HTML</span>
                    </button>
                </div>

                <div class="flex items-center gap-2 ml-auto">
                    <span class="text-xs font-medium text-zinc-400 uppercase tracking-wider hidden sm:inline">Template:</span>
                    <select id="template-select" class="bg-zinc-100 dark:bg-zinc-800/80 sm:bg-transparent border-none rounded-md sm:rounded-none text-brand-600 dark:text-brand-400 text-xs sm:text-sm font-semibold focus:ring-0 cursor-pointer outline-none pl-2 sm:pl-1 pr-6 py-1.5 sm:py-1 appearance-none">
                        <option value="basic">Basic Document</option>
                        <option value="blog">Modern Blog</option>
                        <option value="portfolio">Portfolio Block</option>
                    </select>
                </div>
            </div>
            
            <!-- Tab Contents -->
            <div class="flex-grow relative overflow-hidden bg-white dark:bg-zinc-950/80">
                <!-- Preview iframe -->
                <iframe id="live-preview" class="w-full h-full border-none absolute inset-0 z-10 transition-opacity duration-300" title="Live preview"></iframe>
                
                <!-- Code View -->
                <div id="code-view-wrapper" class="w-full h-full absolute inset-0 z-0 overflow-auto p-3 sm:p-6 hidden-tab transition-opacity duration-300 bg-[#0d1117]">
                    <div class="flex items-center justify-between mb-4 border-b border-zinc-800 pb-2">
                        <div class="flex gap-1.5">
                            <div class="w-3 h-3 rounded-full bg-red-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/80"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/80"></div>
                        </div>
                        <span class="text-xs font-mono text-zinc-500">index.html</span>
                    </div>
                    <pre><code id="code-view" class="font-mono text-[13px] leading-loose text-zinc-300 whitespace-pre-wrap break-words selection:bg-brand-500/30"></code></pre>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer Actions -->
    <footer class="flex-none glass border-t border-zinc-200/80 dark:border-zinc-800/80 p-3 sm:p-4 px-3 sm:px-6 flex flex-wrap justify-center sm:justify-end items-center gap-2 sm:gap-3 z-20 safe-bottom">
        <button id="copy-btn" aria-label="Copy HTML" title="Copy HTML" class="flex items-center justify-center gap-2 px-3 sm:px-4 py-2.5 sm:py-2 bg-zinc-100 dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/80 rounded-xl text-sm font-medium hover:bg-white dark:hover:bg-zinc-700 transition-all hover:shadow-sm">
            <i data-lucide="copy" class="w-4 h-4 text-zinc-500"></i> <span class="hidden sm:inline">Copy HTML</span>
        </button>
        <button id="share-btn" aria-label="Share link" title="Share link" class="flex items-center justify-center gap-2 px-3 sm:px-4 py-2.5 sm:py-2 bg-zinc-100 dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/80 rounded-xl text-sm font-medium hover:bg-white dark:hover:bg-zinc-700 transition-all hover:shadow-sm">
            <i data-lucide="share-2" class="w-4 h-4 text-zinc-500"></i> <span class="hidden sm:inline">Share</span>
        </button>
        <button id="pdf-btn" aria-label="Export PDF" title="Export PDF" class="flex items-center justify-center gap-2 px-3 sm:px-4 py-2.5 sm:py-2 bg-zinc-100 dark:bg-zinc-800/80 border border-zinc-200 dark:border-zinc-700/80 rounded-xl text-sm font-medium hover:bg-white dark:hover:bg-zinc-700 transition-all hover:shadow-sm">
            <i data-lucide="file-down" class="w-4 h-4 text-zinc-500"></i> <span class="hidden sm:inline">Export PDF</span>
        </button>
        <div class="w-px h-6 bg-zinc-200 dark:bg-zinc-800 hidden sm:block mx-1"></div>
        <button id="download-btn" aria-label="Download HTML file" title="Download HTML file" class="flex items-center justify-center gap-2 px-4 sm:px-6 py-2.5 sm:py-2 bg-brand-600 hover:bg-brand-500 text-white rounded-xl text-sm font-medium transition-all shadow-lg shadow-brand-500/25 hover:shadow-brand-500/40">
            <i data-lucide="download" class="w-4 h-4"></i> <span>Download</span><span class="hidden sm:inline">&nbsp;File</span>
        </button>
    </footer>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-24 sm:bottom-24 right-4 sm:right-6 left-4 sm:left-auto bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 px-4 sm:px-5 py-3 sm:py-3.5 rounded-xl shadow-2xl flex items-center gap-3 transform translate-y-[150%] opacity-0 transition-all duration-400 z-50 pointer-events-none border border-zinc-800 dark:border-zinc-200">
        <div class="bg-green-500/20 text-green-500 dark:text-green-600 p-1 rounded-full flex-shrink-0">
            <i data-lucide="check" class="w-4 h-4"></i>
        </div>
        <span id="toast-message" class="text-sm font-semibold tracking-wide">Notification</span>
    </div>

    <script>
    document.addEventListener('DOMContentLoaded', () => {
        // Initialize Icons — resilient to a slow/blocked CDN (retries briefly, then gives up quietly)
        const initIcons = (attemptsLeft = 20) => {
            if (window.lucide && typeof lucide.createIcons === 'function') {
                lucide.createIcons();
            } else if (attemptsLeft > 0) {
                setTimeout(() => initIcons(attemptsLeft - 1), 150);
            } else {
                console.warn('Lucide icons failed to load; buttons will show without icons.');
            }
        };
        initIcons();

        // DOM Elements
        const editor = document.getElementById('text-editor');
        const livePreview = document.getElementById('live-preview');
        const codeView = document.getElementById('code-view');
        const codeWrapper = document.getElementById('code-view-wrapper');
        const templateSelect = document.getElementById('template-select');
        const themeToggle = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        const uploadTriggerBtn = document.getElementById('upload-trigger-btn');
        const fileUpload = document.getElementById('file-upload');
        const editorPanel = document.getElementById('editor-panel');
        const outputPanel = document.getElementById('output-panel');
        const mobileEditorBtn = document.getElementById('mobile-editor-btn');
        const mobileOutputBtn = document.getElementById('mobile-output-btn');
        
        // Initial Content
        const initialContent = ``;

        // Template Generator
        const getFullHtml = (content, template) => {
            // Tailwind CDN script to inject for beautiful previews
            const tailwindScript = `<script src="https://cdn.tailwindcss.com?plugins=typography"><\/script>`;
            
            switch (template) {
                case 'blog':
                    return `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n${tailwindScript}\n<body class="bg-zinc-50 p-8 antialiased">\n    <article class="max-w-2xl mx-auto bg-white p-10 rounded-2xl shadow-sm border border-zinc-100 prose prose-zinc prose-a:text-blue-600 focus:outline-none">\n        <div class="flex items-center gap-3 text-sm text-zinc-500 mb-8 pb-4 border-b border-zinc-100">\n            <span class="font-medium text-brand-600">Tech & Design</span>\n            <span>&bull;</span>\n            <span>${new Date().toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</span>\n        </div>\n        ${content}\n    </article>\n</body>\n</html>`;
                
                case 'portfolio':
                    return `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n${tailwindScript}\n<body class="bg-zinc-900 text-white p-8 antialiased">\n    <section class="max-w-5xl mx-auto">\n        <div class="grid grid-cols-1 md:grid-cols-2 gap-12 items-center bg-zinc-800/50 p-8 rounded-3xl border border-zinc-700/50">\n            <div class="rounded-2xl overflow-hidden shadow-2xl">\n                <img src="https://images.unsplash.com/photo-1555066931-4365d14bab8c?auto=format&fit=crop&w=800&q=80" alt="Portfolio Image" class="w-full h-full object-cover">\n            </div>\n            <div class="prose prose-invert prose-brand">\n                ${content}\n            </div>\n        </div>\n    </section>\n</body>\n</html>`;
                
                case 'basic':
                default:
                    // Basic uses standard CSS for fastest rendering and robust PDF export
                    return `<!DOCTYPE html>\n<html lang="en">\n<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; line-height: 1.7; padding: 3rem; max-width: 800px; margin: 0 auto; color: #3f3f46; background: #ffffff; }
        h1 { color: #18181b; font-size: 2.25rem; font-weight: 700; margin-bottom: 1rem; letter-spacing: -0.025em; }
        h2 { color: #18181b; font-size: 1.5rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; }
        p { margin-bottom: 1.25rem; }
        a { color: #6366f1; text-decoration: none; }
        a:hover { text-decoration: underline; }
        img { max-width: 100%; height: auto; border-radius: 0.5rem; }
        ul, ol { margin-bottom: 1.25rem; padding-left: 1.5rem; }
        li { margin-bottom: 0.5rem; }
        blockquote { border-left: 4px solid #c7d2fe; padding-left: 1rem; color: #52525b; font-style: italic; }
    </style>\n</head>\n<body>\n    ${content}\n</body>\n</html>`;
            }
        };

        // Syntax Highlighter
        const syntaxHighlight = (html) => {
            let formattedHtml = html.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            return formattedHtml.replace(/(&lt;)(\/?\w+)(.*?)(\/?&gt;)/g, (match, p1, p2, p3, p4) => {
                const highlightedAttrs = p3.replace(/([\w-]+)=(".*?")/g, 
                    `<span class="syntax-attr">$1</span>=<span class="syntax-val">$2</span>`
                );
                return `<span class="syntax-tag">${p1}${p2}</span>${highlightedAttrs}<span class="syntax-tag">${p4}</span>`;
            });
        };

        // Update Editor Logic
        const updateOutput = () => {
            const content = editor.innerHTML;
            const template = templateSelect.value;
            const fullHtml = getFullHtml(content, template);
            
            // Preview Update
            livePreview.srcdoc = fullHtml;
            
            // Generate clean code view (if user doesn't want to see full tailwind injection string in simple view)
            codeView.innerHTML = syntaxHighlight(fullHtml);
            
            // Save state
            localStorage.setItem('textWriterContentPro', content);
            localStorage.setItem('textWriterTemplatePro', template);
        };

        // Handle Paste (strip formatting optionally, keeping simple for now)
        // You could add a listener here if you want plain text paste.

        // Configure PDF.js worker (loaded via CDN in <head>)
        if (window.pdfjsLib) {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        }

        // Plain text -> simple paragraph HTML
        const textToHtml = (content) => {
            return content
                .split('\n')
                .map(line => line.trim() ? `<p>${line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</p>` : '<br>')
                .join('');
        };

        // Extract text from a PDF file using PDF.js, returned as paragraph HTML
        const pdfToHtml = async (arrayBuffer) => {
            const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            let paragraphs = [];
            for (let i = 1; i <= pdf.numPages; i++) {
                const page = await pdf.getPage(i);
                const textContent = await page.getTextContent();

                // Group text items into lines based on their y-position
                let lines = [];
                let currentLine = [];
                let lastY = null;
                textContent.items.forEach(item => {
                    const y = item.transform[5];
                    if (lastY !== null && Math.abs(y - lastY) > 2) {
                        lines.push(currentLine.join(' '));
                        currentLine = [];
                    }
                    currentLine.push(item.str);
                    lastY = y;
                });
                if (currentLine.length) lines.push(currentLine.join(' '));

                paragraphs.push(...lines.filter(l => l.trim() !== ''));
                if (i < pdf.numPages) paragraphs.push(''); // page break spacer
            }
            return textToHtml(paragraphs.join('\n'));
        };

        // Convert a Word (.docx) file to HTML using Mammoth.js
        const docxToHtml = async (arrayBuffer) => {
            const result = await mammoth.convertToHtml({ arrayBuffer });
            return result.value;
        };

        // Shared file processing (used by both the file picker and drag & drop)
        const ACCEPTED_FILE_PATTERN = /\.(txt|html?|md|csv|json|pdf|docx?)$/i;

        const processUploadedFile = async (file) => {
            if (!file) return;

            if (!ACCEPTED_FILE_PATTERN.test(file.name)) {
                showToast(`Unsupported file type: ${file.name}`);
                return;
            }

            try {
                if (file.name.match(/\.pdf$/i)) {
                    showToast('Converting PDF...');
                    const arrayBuffer = await file.arrayBuffer();
                    editor.innerHTML = await pdfToHtml(arrayBuffer);
                } else if (file.name.match(/\.docx$/i)) {
                    showToast('Converting Word document...');
                    const arrayBuffer = await file.arrayBuffer();
                    editor.innerHTML = await docxToHtml(arrayBuffer);
                } else if (file.name.match(/\.doc$/i)) {
                    showToast('Legacy .doc files are not fully supported. Please use .docx.');
                    return;
                } else if (file.name.match(/\.(html|htm)$/i)) {
                    const content = await file.text();
                    editor.innerHTML = content;
                } else {
                    const content = await file.text();
                    editor.innerHTML = textToHtml(content);
                }

                updateOutput();
                showToast(`Uploaded: ${file.name}`);
                if (mobileEditorBtn) setMobilePanel('editor'); // jump to the editor on mobile so the result is visible
            } catch (err) {
                console.error(err);
                showToast('Error reading file.');
            }
        };

        // File Upload Logic (click-to-browse)
        if (uploadTriggerBtn && fileUpload) {
            uploadTriggerBtn.addEventListener('click', () => {
                fileUpload.click();
            });

            fileUpload.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                await processUploadedFile(file);
                e.target.value = ''; // Reset input to allow re-uploading the same file
            });
        }

        // Drag & Drop Logic
        const dropzone = document.getElementById('editor-dropzone');
        const dropOverlay = document.getElementById('drop-overlay');
        if (dropzone && dropOverlay) {
            let dragCounter = 0; // tracks nested dragenter/dragleave so the overlay doesn't flicker

            const showOverlay = () => {
                dropOverlay.classList.add('is-active');
                dropzone.classList.add('drag-active');
            };
            const hideOverlay = () => {
                dropOverlay.classList.remove('is-active');
                dropzone.classList.remove('drag-active');
                dragCounter = 0;
            };
            const isFileDrag = (e) => Array.from(e.dataTransfer?.types || []).includes('Files');

            dropzone.addEventListener('dragenter', (e) => {
                if (!isFileDrag(e)) return;
                e.preventDefault();
                dragCounter++;
                showOverlay();
            });

            dropzone.addEventListener('dragover', (e) => {
                if (!isFileDrag(e)) return;
                e.preventDefault(); // required to allow dropping
                e.dataTransfer.dropEffect = 'copy';
            });

            dropzone.addEventListener('dragleave', (e) => {
                if (!isFileDrag(e)) return;
                e.preventDefault();
                dragCounter = Math.max(0, dragCounter - 1);
                if (dragCounter === 0) hideOverlay();
            });

            dropzone.addEventListener('drop', async (e) => {
                if (!isFileDrag(e)) return;
                e.preventDefault();
                hideOverlay();
                const file = e.dataTransfer.files && e.dataTransfer.files[0];
                await processUploadedFile(file);
            });

            // Prevent the browser from navigating away if a file is dropped just outside the zone
            ['dragover', 'drop'].forEach(evt => {
                window.addEventListener(evt, (e) => {
                    if (isFileDrag(e)) e.preventDefault();
                });
            });
        }

        // Debounce Utility
        const debounce = (func, delay) => {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), delay);
            };
        };

        // Toast Notification System
        let toastTimeout;
        const showToast = (message) => {
            const toast = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            msgEl.textContent = message;
            
            toast.classList.remove('translate-y-[150%]', 'opacity-0');
            
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.add('translate-y-[150%]', 'opacity-0');
            }, 3000);
        };

        // Event Listeners for Editor
        editor.addEventListener('input', debounce(updateOutput, 300));

        // Placeholder logic for contenteditable
        const handlePlaceholder = () => {
            if (editor.textContent.trim() === '' && editor.innerHTML.trim() === '') {
                editor.innerHTML = ''; // Keep it truly empty to show CSS placeholder if we add one, or handle via JS
            }
        };
        editor.addEventListener('keyup', handlePlaceholder);

        // Toolbar Buttons
        document.querySelectorAll('.toolbar-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault(); // Prevent focus loss
                const command = btn.dataset.command;
                const value = btn.dataset.value || null;

                if (command === 'createLink') {
                    const url = prompt('Enter the URL (e.g., https://example.com):');
                    if (url) document.execCommand(command, false, url);
                } else {
                    document.execCommand(command, false, value);
                }
                editor.focus();
                updateOutput();
            });
        });

        // Tab Switching Logic
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Remove active states from all
                document.querySelectorAll('.tab-btn').forEach(b => {
                    b.classList.remove('active', 'bg-white', 'dark:bg-zinc-700', 'text-zinc-900', 'dark:text-white', 'shadow-sm');
                    b.classList.add('text-zinc-500', 'dark:text-zinc-400');
                });
                
                // Add active state to clicked
                btn.classList.add('active', 'bg-white', 'dark:bg-zinc-700', 'text-zinc-900', 'dark:text-white', 'shadow-sm');
                btn.classList.remove('text-zinc-500', 'dark:text-zinc-400');

                // Toggle panels
                const tab = btn.dataset.tab;
                if (tab === 'preview') {
                    livePreview.classList.remove('hidden-tab');
                    codeWrapper.classList.add('hidden-tab');
                } else {
                    livePreview.classList.add('hidden-tab');
                    codeWrapper.classList.remove('hidden-tab');
                }
            });
        });

        // Mobile Panel Switcher (Write / Preview) — below the lg breakpoint only
        const setMobilePanel = (panel) => {
            const showEditor = panel === 'editor';
            editorPanel.classList.toggle('mobile-hide', !showEditor);
            outputPanel.classList.toggle('mobile-hide', showEditor);

            [mobileEditorBtn, mobileOutputBtn].forEach(btn => {
                const isActive = btn === (showEditor ? mobileEditorBtn : mobileOutputBtn);
                btn.classList.toggle('bg-white', isActive);
                btn.classList.toggle('dark:bg-zinc-700', isActive);
                btn.classList.toggle('text-zinc-900', isActive);
                btn.classList.toggle('dark:text-white', isActive);
                btn.classList.toggle('shadow-sm', isActive);
                btn.classList.toggle('text-zinc-500', !isActive);
                btn.classList.toggle('dark:text-zinc-400', !isActive);
                btn.setAttribute('aria-pressed', String(isActive));
            });
        };
        if (mobileEditorBtn && mobileOutputBtn) {
            mobileEditorBtn.addEventListener('click', () => setMobilePanel('editor'));
            mobileOutputBtn.addEventListener('click', () => setMobilePanel('output'));
        }

        // Template Change
        templateSelect.addEventListener('change', updateOutput);

        // Theme Toggle
        themeToggle.addEventListener('click', () => {
            htmlElement.classList.toggle('dark');
            const isDark = htmlElement.classList.contains('dark');
            localStorage.setItem('textWriterThemePro', isDark ? 'dark' : 'light');
        });

        // Actions: Copy
        document.getElementById('copy-btn').addEventListener('click', () => {
            const html = getFullHtml(editor.innerHTML, templateSelect.value);
            navigator.clipboard.writeText(html).then(() => showToast('HTML copied to clipboard!'));
        });

        // Actions: Share
        document.getElementById('share-btn').addEventListener('click', () => {
            try {
                const contentToShare = btoa(encodeURIComponent(editor.innerHTML));
                const shareUrl = `${window.location.origin}${window.location.pathname}#${contentToShare}`;
                navigator.clipboard.writeText(shareUrl).then(() => showToast('Link copied to clipboard!'));
            } catch (e) {
                showToast('Failed to generate share link.');
            }
        });

        // Actions: Download
        document.getElementById('download-btn').addEventListener('click', () => {
            const html = getFullHtml(editor.innerHTML, templateSelect.value);
            const blob = new Blob([html], { type: 'text/html' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('HTML file downloaded!');
        });

        // Actions: PDF Export
        document.getElementById('pdf-btn').addEventListener('click', () => {
            showToast('Preparing PDF...');
            // Force basic template for PDF to ensure styles are loaded synchronously
            const html = getFullHtml(editor.innerHTML, 'basic');
            
            const opt = {
                margin: 0.5,
                filename: 'document.pdf',
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { scale: 2, useCORS: true },
                jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
            };

            const iframe = document.createElement('iframe');
            iframe.style.position = 'fixed';
            iframe.style.left = '-9999px';
            document.body.appendChild(iframe);
            iframe.contentDocument.open();
            iframe.contentDocument.write(html);
            iframe.contentDocument.close();

            setTimeout(() => {
                html2pdf().from(iframe.contentDocument.body).set(opt).save().then(() => {
                    document.body.removeChild(iframe);
                    showToast('PDF Exported successfully!');
                }).catch(() => {
                    document.body.removeChild(iframe);
                    showToast('PDF generation failed.');
                });
            }, 500);
        });

        // Initialize App
        const init = () => {
            // Load theme
            const savedTheme = localStorage.getItem('textWriterThemePro');
            if (savedTheme === 'light') {
                htmlElement.classList.remove('dark');
            } else {
                htmlElement.classList.add('dark'); // Default to dark
            }

            // Load saved template selection
            const savedTemplate = localStorage.getItem('textWriterTemplatePro');
            if(savedTemplate) {
                templateSelect.value = savedTemplate;
            }

            // Load content from hash or storage
            if (window.location.hash) {
                try {
                    editor.innerHTML = decodeURIComponent(atob(window.location.hash.substring(1)));
                    history.replaceState(null, null, ' ');
                } catch (e) {
                    editor.innerHTML = localStorage.getItem('textWriterContentPro') || initialContent;
                }
            } else {
                editor.innerHTML = localStorage.getItem('textWriterContentPro') || initialContent;
            }
            
            updateOutput();
            editor.focus(); // Auto-focus editor on load
        };

        init();
    });
    </script>
</body>
</html>
